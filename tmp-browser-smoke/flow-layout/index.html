<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Flow Layout Smoke</title>
  <style>
    body { margin: 0; font: 16px sans-serif; background: white; color: black; }
    main { display: block; padding: 24px; }
    h1, p { display: block; margin: 0 0 18px 0; }
    img { display: block; margin: 24px 0; border: 2px solid #222; }
  </style>
</head>
<body>
  <main>
    <h1>Flow Layout Smoke</h1>
    <p>First image should sit above the second image with visible whitespace between them.</p>
    <img src="/red.png" alt="red block">
    <p>Second paragraph should appear between the two images.</p>
    <img src="/green.png" alt="green block">
  </main>
</body>
</html>
