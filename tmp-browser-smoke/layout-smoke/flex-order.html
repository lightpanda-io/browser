<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Flex Order - Lightpanda Browser</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
    }

    body {
      padding: 24px;
    }

    .toolbar {
      width: 360px;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border: 1px solid #dfe1e5;
      background: #f8f9fa;
    }

    .chip {
      display: block;
      width: 88px;
      height: 40px;
      line-height: 40px;
      text-align: center;
      text-decoration: none;
      color: #fff;
      font-weight: 700;
      border: 0;
    }

    .chip.red {
      order: 2;
      background: rgb(220, 50, 50);
    }

    .chip.blue {
      order: -1;
      background: rgb(40, 110, 220);
    }

    .chip.green {
      order: 1;
      background: rgb(40, 170, 90);
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <a class="chip red" href="/flex_order_red_target.html">RED</a>
    <a class="chip blue" href="/flex_order_blue_target.html">BLUE</a>
    <a class="chip green" href="/flex_order_green_target.html">GREEN</a>
  </div>
</body>
</html>
