<!doctype html>
<html>
<head><meta charset="utf-8"><title>Background Position Layout - Lightpanda Browser</title></head>
<body style="margin:0;background:#ffffff;font-family:sans-serif">
  <div id="percent" style="width:240px;height:120px;margin:20px auto;background-color:#efefef;background-image:url(/layout-tall-blue.png);background-position:25% 50%;background-repeat:no-repeat"></div>
  <div id="center" style="width:240px;height:120px;margin:20px auto;background-color:#efefef;background-image:url(/layout-tall-blue.png);background-position:center center;background-repeat:no-repeat"></div>
  <div id="end" style="width:240px;height:120px;margin:20px auto;background-color:#efefef;background-image:url(/layout-tall-blue.png);background-position:right bottom;background-repeat:no-repeat"></div>
</body>
</html>
