<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Box Shadow - Lightpanda Browser</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  background: #fff;
}

#shadow-card {
  position: absolute;
  left: 40px;
  top: 30px;
  width: 140px;
  height: 90px;
  background: #fff;
  border-radius: 20px;
  box-shadow: 30px 20px 0 0 rgba(0, 0, 0, 0.35);
}
</style>
</head>
<body>
<div id="shadow-card"></div>
</body>
</html>
