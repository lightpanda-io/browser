<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Delayed Screenshot Layout</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100vh;
      background: rgb(255, 255, 255);
    }
    #late {
      width: 100%;
      margin: 80px auto 0 auto;
      text-align: center;
      font-size: 36px;
      font-weight: 700;
      color: rgb(220, 50, 50);
    }
  </style>
</head>
<body>
  <script>
    setTimeout(function () {
      var box = document.createElement("div");
      box.id = "late";
      box.textContent = "DELAYED READY";
      document.body.appendChild(box);
      document.title = "Delayed Screenshot Ready";
    }, 700);
  </script>
</body>
</html>
