<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Flex Center Layout</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100vh;
      background: rgb(255, 255, 255);
    }
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .hero {
      width: min(584px, 80vw);
      margin-left: auto;
      margin-right: auto;
      text-align: center;
    }
    .logo {
      margin: 0 0 24px 0;
      font-size: 64px;
      line-height: 1;
      font-weight: 700;
      color: rgb(220, 50, 50);
    }
    .search {
      margin: 0;
      font-size: 48px;
      line-height: 1;
      font-weight: 700;
      color: rgb(40, 110, 220);
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="logo">FLEX</div>
    <div class="search">CENTER</div>
  </div>
</body>
</html>
