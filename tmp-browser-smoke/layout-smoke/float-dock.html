<!doctype html>
<html>
<head>
  <style>
    body {
      margin: 0;
      background: #fff;
      font: 16px/1.4 sans-serif;
    }
    .shell {
      margin: 24px;
      padding: 12px;
      border: 1px solid #ddd;
    }
    .left-chip {
      float: left;
      width: 140px;
      height: 40px;
      background: #d64d4d;
      color: #fff;
      line-height: 40px;
      text-align: center;
      display: inline-block;
    }
    .right-chip {
      float: right;
      width: 140px;
      height: 40px;
      background: #326fd1;
      color: #fff;
      line-height: 40px;
      text-align: center;
      display: inline-block;
    }
    .body-copy {
      display: block;
      margin-top: 12px;
      padding: 12px;
      background: #5aa15a;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="left-chip">Left Dock</div>
    <div class="right-chip">Right Dock</div>
    <div class="body-copy">Body Flow</div>
  </div>
</body>
</html>
