<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mixed Inline Checkbox Link</title>
</head>
<body style="margin:0;background:white;color:black;font:18px sans-serif;">
  <main style="display:block;padding:24px;width:320px;">
    <p style="display:block;margin:0 0 24px 0;width:220px;">
      Lead text before the checkbox
      <input
        id="target-checkbox"
        type="checkbox"
        style="display:inline;color:white;background-color:#d38a1d;padding:6px 10px;width:150px;border:0;"
        onchange="document.title='Inline Checkbox ' + this.checked;"
      >
      bridge words before the link
      <a id="target-link" href="/next.html" style="display:inline;color:#555;text-decoration:none;">
        <span style="display:inline;color:white;background-color:#1a55d6;padding:6px 10px;">LINK</span>
        now
      </a>
    </p>
    <p style="display:block;margin:0;">Below paragraph stays below the checkbox and link flow.</p>
  </main>
</body>
</html>
