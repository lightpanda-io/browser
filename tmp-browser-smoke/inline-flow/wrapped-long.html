    <p style="display:block;margin:0 0 24px 0;width:230px;">
      Lead text before
      <a href="/next.html" style="display:inline;color:#555;text-decoration:none;">
        start
        <span style="display:inline;color:white;background-color:#1a55d6;padding:6px 10px;">TOP</span>
        middle words that keep wrapping through
