<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mixed Inline Checkbox Pair Button Link</title>
</head>
<body style="margin:0;background:white;color:black;font:18px sans-serif;">
  <main style="display:block;padding:24px;width:320px;">
    <p style="display:block;margin:0 0 24px 0;width:220px;">
      Lead text before the first checkbox
      <input
        id="target-checkbox-one"
        type="checkbox"
        name="choice-one"
        onchange="document.title='Dense Checkbox Pair one ' + this.checked;"
        style="display:inline;color:white;background-color:#27965d;padding:6px 10px;width:150px;border:0;"
      >
      bridge words before the second checkbox
      <input
        id="target-checkbox-two"
        type="checkbox"
        name="choice-two"
        onchange="document.title='Dense Checkbox Pair two ' + this.checked;"
        style="display:inline;color:white;background-color:#d38a1d;padding:6px 10px;width:150px;border:0;"
      >
      bridge words before button
      <button
        id="target-button"
        type="button"
        onclick="document.title='Dense Checkbox Pair Button 1';"
        style="display:inline;color:white;background-color:#c13db5;padding:6px 12px;border:0;"
      >
        Button
      </button>
      bridge words before the link
      <a id="target-link" href="/next.html" style="display:inline;color:#555;text-decoration:none;">
        <span style="display:inline;color:white;background-color:#1a55d6;padding:6px 10px;">LINK</span>
        now
      </a>
    </p>
    <p style="display:block;margin:0;">Below paragraph stays below the checkbox pair, button, and link flow.</p>
  </main>
</body>
</html>
