<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dense Inline Focus Flow</title>
  <script>
    let clicks = 0;
    function bump() {
      clicks += 1;
      document.title = 'Dense Button ' + clicks;
    }
  </script>
</head>
<body style="margin:0;background:white;color:black;font:18px sans-serif;">
  <main style="display:block;padding:24px;width:320px;">
    <p style="display:block;margin:0 0 24px 0;width:220px;">
      Lead text before
      <button
        id="target-button"
        type="button"
        style="display:inline;color:white;background-color:#c13db5;padding:6px 12px;border:0;"
        onclick="bump();"
      >
        BUTTON
      </button>
      bridge words before the input
      <input
        id="target-input"
        type="text"
        value=""
        placeholder="TYPE"
        style="display:inline;color:white;background-color:#1db6d2;padding:6px 10px;width:150px;border:0;"
        oninput="document.title='Dense Input ' + this.value;"
      >
      trailing words before the
      <a id="target-link" href="/next.html" style="display:inline;color:#555;text-decoration:none;">
        <span style="display:inline;color:white;background-color:#1a55d6;padding:6px 10px;">LINK</span>
        now
      </a>
    </p>
    <p style="display:block;margin:0;">Below paragraph stays below the dense mixed inline flow.</p>
  </main>
</body>
</html>
