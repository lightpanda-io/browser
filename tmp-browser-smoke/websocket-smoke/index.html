<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebSocket Echo Loading</title>
  <style>
    body {
      margin: 0;
      font: 16px/1.4 Consolas, "Courier New", monospace;
      background: #f5f7fb;
      color: #122033;
    }
    main {
      padding: 24px;
    }
    pre {
      padding: 16px;
      border: 1px solid #c7d2e1;
      background: #ffffff;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main>
    <h1>WebSocket Echo</h1>
    <pre id="log">connecting...</pre>
  </main>
  <script>
    (() => {
      const logEl = document.getElementById('log');
      let finished = false;
      const mode =
        new URLSearchParams(location.search).get('mode') ||
        (location.hash ? location.hash.slice(1) : '') ||
        'echo';

      function setState(title, message) {
        document.title = title;
        logEl.textContent = message;
      }

      try {
        if (mode === 'global') {
          setState('WebSocket Global ' + typeof WebSocket, 'typeof WebSocket = ' + typeof WebSocket);
          return;
        }

        const scheme = location.protocol === 'https:' ? 'wss://' : 'ws://';
        const endpoint = mode === 'subprotocol' ? '/protocol' : '/echo';
        const protocols = mode === 'subprotocol' ? ['chat', 'superchat'] : undefined;
        const ws = protocols ? new WebSocket(scheme + location.host + endpoint, protocols) : new WebSocket(scheme + location.host + endpoint);

        if (mode === 'construct') {
          setState('WebSocket Constructed', 'constructed');
          ws.close();
          return;
        }

        if (mode === 'binary-close') {
          let step = 0;
          ws.binaryType = 'arraybuffer';

          ws.onopen = () => {
            setState('WebSocket Binary Close Open', 'open');
            ws.send('ping');
          };

          ws.onmessage = (event) => {
            if (step === 0) {
              if (event.data !== 'echo:ping') {
                finished = true;
                setState('WebSocket Binary Close Error', 'unexpected text: ' + event.data);
                ws.close();
                return;
              }
              step = 1;
              ws.send(new Uint8Array([1, 2, 3]));
              return;
            }

            if (!(event.data instanceof ArrayBuffer)) {
              finished = true;
              setState('WebSocket Binary Close Error', 'binary-not-arraybuffer');
              ws.close();
              return;
            }

            const bytes = Array.from(new Uint8Array(event.data)).join(',');
            if (bytes !== '1,2,3') {
              finished = true;
              setState('WebSocket Binary Close Error', 'unexpected-bytes:' + bytes);
              ws.close();
              return;
            }

            step = 2;
            ws.send('close-me');
          };

          ws.onclose = (event) => {
            if (step !== 2) {
              finished = true;
              setState('WebSocket Binary Close Error', 'closed-before-binary');
              return;
            }
            if (event.code !== 4001 || event.reason !== 'server-close' || event.wasClean !== true) {
              finished = true;
              setState('WebSocket Binary Close Error', 'bad-close:' + event.code + ':' + event.reason + ':' + event.wasClean);
              return;
            }
            finished = true;
            setState('WebSocket Binary Close Ready', 'binary+close ok');
          };
          return;
        }

        if (mode === 'subprotocol') {
          ws.binaryType = 'arraybuffer';
          let gotBinary = false;

          ws.onerror = () => {
            if (finished) return;
            finished = true;
            setState('WebSocket Subprotocol Error', 'error');
          };

          ws.onopen = () => {
            if (ws.protocol !== 'superchat') {
              finished = true;
              setState('WebSocket Subprotocol Error', 'bad-protocol:' + ws.protocol);
              ws.close();
              return;
            }
            if (ws.extensions !== 'permessage-test') {
              finished = true;
              setState('WebSocket Subprotocol Error', 'bad-extensions:' + ws.extensions);
              ws.close();
              return;
            }
            ws.send(new Uint8Array([4, 5, 6]));
          };

          ws.onmessage = (event) => {
            if (!(event.data instanceof ArrayBuffer)) {
              finished = true;
              setState('WebSocket Subprotocol Error', 'binary-not-arraybuffer');
              ws.close();
              return;
            }
            const bytes = Array.from(new Uint8Array(event.data)).join(',');
            if (bytes !== '4,5,6') {
              finished = true;
              setState('WebSocket Subprotocol Error', 'unexpected-bytes:' + bytes);
              ws.close();
              return;
            }
            gotBinary = true;
            ws.close(1000, 'done');
          };

          ws.onclose = (event) => {
            if (!gotBinary) {
              finished = true;
              setState('WebSocket Subprotocol Error', 'closed-before-binary');
              return;
            }
            if (event.code !== 1000 || event.reason !== 'done' || event.wasClean !== true) {
              finished = true;
              setState('WebSocket Subprotocol Error', 'bad-close:' + event.code + ':' + event.reason + ':' + event.wasClean);
              return;
            }
            finished = true;
            setState('WebSocket Subprotocol Ready', 'protocol+binary ok');
          };
          return;
        }

        ws.onerror = () => {
          if (finished) return;
          finished = true;
          setState('WebSocket Echo Error', 'error');
        };

        ws.onopen = () => {
          setState('WebSocket Echo Open', 'open');
          ws.send('ping');
        };

        ws.onmessage = (event) => {
          if (event.data !== 'echo:ping') {
            finished = true;
            setState('WebSocket Echo Error', 'unexpected message: ' + event.data);
            ws.close();
            return;
          }
          finished = true;
          setState('WebSocket Echo Ready', event.data);
          ws.close();
        };

        ws.onclose = () => {
          if (!finished) {
            finished = true;
            setState('WebSocket Echo Error', 'closed-before-echo');
          }
        };
      } catch (err) {
        setState('WebSocket Echo Error', String(err));
      }
    })();
  </script>
</body>
</html>
