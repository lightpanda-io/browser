.gbts {

}

.gbz0l .gbts {

  font-weight: bold;
}

#gbg .gbgt {

}
</style>
</head>
<body>
  <div id="gbz">
    <a id="search-link" class="gbzt gbz0l" href="#">
      <span id="search-text" class="gbts">Search</span>
    </a>
    <a class="gbzt" href="#">
      <span class="gbts">More</span>
    </a>
  </div>
  <div id="gbg">
    <a id="images-link" class="gbgt" href="#">
      <span id="images-text" class="gbts">Images</span>
    </a>
    <a id="sign-in-link" class="gbgt" href="#">

    </a>

</html>
