<!doctype html>
<html>
<head>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font: 16px Arial, sans-serif;
    }

    .pill {
      display: inline-block;
      margin-right: 14px;
      background: #d7d7d7;
      border: 1px solid #989898;
    }

    .inner {
      display: block;
      padding: 6px 14px;
      background: #ececec;
    }
  </style>
</head>
<body>
  <span class="pill"><span class="inner">Alpha</span></span>
  <span class="pill"><span class="inner">Beta</span></span>
</body>
</html>
