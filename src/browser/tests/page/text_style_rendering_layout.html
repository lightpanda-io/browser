<!doctype html>
<html>
<head>
  <style>
    body {
      margin: 0;
      background: #fff;
      font: 13px Arial, sans-serif;
    }

    .row {
      width: 320px;
      text-align: center;
      margin: 0 0 18px 0;
      padding: 0;
    }

    .mono-spaced {
      letter-spacing: 4px;
    }

    .pair-spaced {
      word-spacing: 10px;
    }

    .caps {
      line-height: 30px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="mono-base" class="row">Mono</div>
  <div id="mono-spaced" class="row mono-spaced">Mono</div>
  <div id="pair-base" class="row">Alpha Beta</div>
  <div id="pair-spaced" class="row pair-spaced">Alpha Beta</div>
  <div id="caps" class="row caps">google</div>
</body>
</html>
