<!doctype html>
<html>
<head>
  <style>
    body {
      margin: 0;
      background: #fff;
      color: #1f1f1f;
      font: 16px/1.4 sans-serif;
    }
    .logo {
      width: 272px;
      height: 92px;
      margin: 0 auto 18px auto;
      background: #4d88ff;
      color: #fff;
      font-size: 42px;
      font-weight: bold;
      line-height: 92px;
      text-align: center;
    }
    .search-shell {
      display: inline-block;
      width: 496px;
      height: 32px;
      margin: 4px 0;
      background: #cfcfcf;
      border: 1px solid #999;
    }
    .search-shell input {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0 10px;
      border: none;
      background: transparent;
      font: 18px sans-serif;
      box-sizing: border-box;
    }
    .ds {
      display: inline-block;
      margin: 4px 6px 0 6px;
    }
    .lsbb {
      display: block;
      background: #ececec;
      border: 1px solid #aaa;
      height: 30px;
    }
    .lsb {
      height: 30px;
      border: none;
      background: transparent;
      font: 15px sans-serif;
      padding: 0 16px;
    }
    .side-pill {
      width: 120px;
      height: 26px;
      background: #24a264;
      color: #fff;
      text-align: center;
      line-height: 26px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <center>
    <div class="logo">G</div>
    <form>
      <table id="search-table" cellpadding="0" cellspacing="0">
        <tr id="search-row" valign="top">
          <td width="25%">&nbsp;</td>
          <td id="main-cell" align="center" nowrap>
            <div class="search-shell"><input name="q" value=""></div>
            <br>
            <span class="ds"><span class="lsbb"><input class="lsb" value="Google Search" type="submit"></span></span>
            <span class="ds"><span class="lsbb"><input class="lsb" value="I'm Feeling Lucky" type="submit"></span></span>
          </td>
          <td id="side-cell" align="left" width="25%">
            <div class="side-pill">Advanced</div>
          </td>
        </tr>
      </table>
    </form>
  </center>
</body>
</html>
