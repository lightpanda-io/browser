<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Flex Column Reverse - Lightpanda Browser</title>
<style>
html, body {
  margin: 0;
  padding: 0;
}
#box {
  display: flex;
  flex-direction: column-reverse;
  width: 180px;
  height: 180px;
}
.red, .gray, .blue {
  height: 40px;
}
.red { background: #d9534f; }
.gray { background: #909090; }
.blue { background: #428bca; }
</style>
</head>
<body>
<div id="box">
  <div class="red"></div>
  <div class="gray"></div>
  <div class="blue"></div>
</div>
</body>
</html>
