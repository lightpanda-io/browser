<!doctype html>
<html>
<head>
  <title>Flex Align Self - Lightpanda Browser</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
    }

    body {
      padding: 24px;
    }

    .toolbar {
      width: 420px;
      height: 160px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px;
      border: 1px solid #dfe1e5;
      background: #f8f9fa;
    }

    .chip {
      width: 100px;
      height: 32px;
      border: 0;
    }

    .red {
      height: 64px;
      background: rgb(220, 50, 50);
    }

    .gray {
      width: 140px;
      align-self: center;
      background: rgb(160, 160, 160);
    }

    .blue {
      height: 24px;
      align-self: flex-end;
      background: rgb(40, 110, 220);
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="chip red"></div>
    <div class="chip gray"></div>
    <div class="chip blue"></div>
  </div>
</body>
</html>
