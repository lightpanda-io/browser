<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #f3f4f7;
      font: 16px sans-serif;
    }

    .row {
      display: flex;
      gap: 18px;
      align-items: center;
    }

    input {
      width: 220px;
      height: 38px;
      padding: 8px 12px;
      border: 1px solid #444;
      background: #fff;
      color: #222;
    }
  </style>
</head>
<body>
  <div class="row">
    <input id="first" type="text" value="alpha lane">
    <input id="second" type="text" value="bravo field">
  </div>
</body>
</html>
