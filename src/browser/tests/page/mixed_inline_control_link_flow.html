<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mixed Inline Control Link Flow</title>
</head>
<body style="margin:0;background:white;color:black;font:18px sans-serif;">
  <main style="display:block;padding:24px;width:320px;">
    <p style="display:block;margin:0 0 24px 0;width:220px;">
      Lead text before button
      <button type="button" style="display:inline;color:white;background-color:#c13db5;padding:6px 12px;border:0;">
        BUTTON
      </button>
      middle words that wrap before the link
      <a href="/next.html" style="display:inline;color:#555;text-decoration:none;">
        <span style="display:inline;color:white;background-color:#1a55d6;padding:6px 10px;">LINK</span>
        now
      </a>
    </p>
    <p style="display:block;margin:0;">Below paragraph stays below the mixed control and link flow.</p>
  </main>
</body>
</html>
