<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Noscript Render Layout</title>
  <style>
    body {
      margin: 0;
      font: 16px Arial, sans-serif;
      color: #202124;
      background: #fff;
    }

    main {
      padding: 24px;
    }

    p {
      margin: 0;
    }
  </style>
</head>
<body>
  <main>
    <noscript id="fallback"><div>Enable javascript</div></noscript>
    <p id="visible">Visible content</p>
  </main>
</body>
</html>
