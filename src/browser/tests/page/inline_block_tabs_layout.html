<!doctype html>
<html>
<head>
  <style>
    body {
      margin: 0;
      font: 16px Arial, sans-serif;
    }

    .bar {
      background: #222;
      padding: 8px 12px;
    }

    .tabs {
      display: block;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .tab {
      display: inline-block;
      margin-right: 10px;
      background: #444;
    }

    .tab a {
      display: block;
      color: #fff;
      padding: 6px 12px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="bar">
    <ol class="tabs">
      <li class="tab"><a href="#search">Search</a></li>
      <li class="tab"><a href="#images">Images</a></li>
      <li class="tab"><a href="#maps">Maps</a></li>
    </ol>
  </div>
</body>
</html>
