<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mixed Inline Checkbox Pair Submit Flow</title>
</head>
<body style="margin:0;background:white;color:black;font:18px sans-serif;">
  <main style="display:block;padding:24px;width:320px;">
    <form action="/submitted-checkbox-pair.html" method="get">
      <p style="display:block;margin:0 0 24px 0;width:220px;">
        Lead text before the first checkbox
        <input
          type="checkbox"
          name="choice-one"
          value="one"
          style="display:inline;color:white;background-color:#27965d;padding:6px 10px;width:150px;border:0;"
        >
        bridge words before the second checkbox
        <input
          type="checkbox"
          name="choice-two"
          value="two"
          style="display:inline;color:white;background-color:#d38a1d;padding:6px 10px;width:150px;border:0;"
        >
        bridge words before submit
        <button type="submit" style="display:inline;color:white;background-color:#c13db5;padding:6px 12px;border:0;">
          Submit
        </button>
      </p>
    </form>
    <p style="display:block;margin:0;">Below paragraph stays below the checkbox pair and submit flow.</p>
  </main>
</body>
</html>
