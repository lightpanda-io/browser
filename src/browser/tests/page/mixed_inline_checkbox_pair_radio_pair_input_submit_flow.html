<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mixed Inline Checkbox Pair Radio Pair Input Submit Flow</title>
</head>
<body style="margin:0;background:white;color:black;font:18px sans-serif;">
  <main style="display:block;padding:24px;width:320px;">
    <form action="/submitted-checkbox-radio-pair-input.html" method="get">
      <p style="display:block;margin:0 0 24px 0;width:220px;">
        Lead text before the first checkbox
        <input
          type="checkbox"
          name="choice-check-one"
          value="one"
          style="display:inline;color:white;background-color:#27965d;padding:6px 10px;width:150px;border:0;"
        >
        bridge words before the second checkbox
        <input
          type="checkbox"
          name="choice-check-two"
          value="two"
          style="display:inline;color:white;background-color:#d38a1d;padding:6px 10px;width:150px;border:0;"
        >
        bridge words before the first radio
        <input
          type="radio"
          name="choice-radio"
          value="one"
          style="display:inline;color:white;background-color:#3b6ecf;padding:6px 10px;width:150px;border:0;"
        >
        bridge words before the second radio
        <input
          type="radio"
          name="choice-radio"
          value="two"
          style="display:inline;color:white;background-color:#8c40cc;padding:6px 10px;width:150px;border:0;"
        >
        bridge words before the input
        <input
          name="entry"
          type="text"
          value=""
          style="display:inline;color:white;background-color:#1db6d2;padding:6px 10px;width:170px;border:0;"
        >
        bridge words before submit
        <button type="submit" style="display:inline;color:white;background-color:#c13db5;padding:6px 12px;border:0;">
          Submit
        </button>
      </p>
    </form>
    <p style="display:block;margin:0;">Below paragraph stays below the checkbox pair, radio pair, input, and submit flow.</p>
  </main>
</body>
</html>
