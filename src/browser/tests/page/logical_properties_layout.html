<!doctype html>
<html>
<body style="margin:0;padding:20px;background:#ffffff">
  <div
    id="logical"
    style="
      margin-inline-start:24px;
      inline-size:140px;
      block-size:70px;
      background:#d74c41;
    "
  ></div>
  <div
    id="padbox"
    style="
      position:absolute;
      inset-inline-start:40px;
      inset-block-start:120px;
      padding-inline:16px 12px;
      padding-block:10px 8px;
      background:#efefef;
    "
  >
    <div id="inner" style="inline-size:30px;block-size:12px;background:#255dd7"></div>
  </div>
  <div
    id="footer"
    style="
      position:absolute;
      inset-inline-start:40px;
      inset-block-start:180px;
      inline-size:120px;
      block-size:40px;
      max-inline-size:80px;
      max-block-size:20px;
      background:#39a853;
    "
  ></div>
  <div
    id="badge"
    style="
      position:absolute;
      inset-inline-end:30px;
      inset-block-start:26px;
      inline-size:26px;
      block-size:18px;
      background:#fbbc04;
    "
  ></div>
</body>
</html>
