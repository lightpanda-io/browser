<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Transform Translate Link Layout - Lightpanda Browser</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #f3f5f8;
    font-family: Arial, sans-serif;
  }

  .stage {
    position: relative;
    width: 640px;
    height: 420px;
    background: linear-gradient(#ffffff, #eef2ff);
    overflow: hidden;
  }

  .center-shell {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 260px;
    height: 160px;
    transform: translate(-50%, -50%);
    background: #1f6feb;
    border: 4px solid #0f4aa8;
    border-radius: 24px;
    color: #ffffff;
    text-align: center;
  }

  .center-shell .title {
    margin-top: 28px;
    font-size: 22px;
    font-weight: 700;
  }

  .center-shell a {
    display: inline-block;
    margin-top: 28px;
    padding: 10px 16px;
    border-radius: 999px;
    background: #ffffff;
    color: #1f6feb;
    text-decoration: none;
    font-weight: 700;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="center-shell">
      <div class="title">Centered Translate Link</div>
      <a href="transform_translate_target.html">Open Target</a>
    </div>
  </div>
</body>
</html>
