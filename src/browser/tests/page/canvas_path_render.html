<!doctype html>
<html>
<body style="margin:0;background:#ffffff">
  <canvas id="main" width="120" height="80"></canvas>
  <script>
    const canvas = document.getElementById("main");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.beginPath();
    ctx.moveTo(10, 10);
    ctx.lineTo(60, 10);
    ctx.lineTo(35, 45);
    ctx.closePath();
    ctx.fillStyle = "#00ff00";
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(10, 70);
    ctx.lineTo(100, 70);
    ctx.lineTo(100, 30);
    ctx.strokeStyle = "#0000ff";
    ctx.stroke();

    const fill = ctx.getImageData(35, 20, 1, 1).data;
    const horizontal = ctx.getImageData(60, 70, 1, 1).data;
    const vertical = ctx.getImageData(100, 50, 1, 1).data;
    document.title =
      (fill[1] === 255 && horizontal[2] === 255 && vertical[2] === 255)
      ? "Canvas Path Ready"
      : "Canvas Path Failed";
  </script>
</body>
</html>
