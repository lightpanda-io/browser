<!DOCTYPE html>
<script src="../testing.js"></script>

<script id=navigator>
  // Navigator should be accessible from window
  testing.expectEqual(navigator, window.navigator);
  testing.expectEqual(true, navigator.userAgent.length > 0);
  testing.expectEqual(true, navigator.userAgent.includes('Lightpanda'));
  testing.expectEqual('Netscape', navigator.appName);
  testing.expectEqual('1.0', navigator.appVersion);
  testing.expectEqual(true, navigator.platform.length > 0);

  // Platform should be one of the known values
  const validPlatforms = ['MacIntel', 'Win32', 'Linux x86_64', 'FreeBSD', 'Unknown'];
  testing.expectEqual(true, validPlatforms.includes(navigator.platform));
  testing.expectEqual('en-US', navigator.language);
  testing.expectEqual(true, Array.isArray(navigator.languages));
  testing.expectEqual(2, navigator.languages.length);
  testing.expectEqual('en-US', navigator.languages[0]);
  testing.expectEqual('en', navigator.languages[1]);
  testing.expectEqual(true, navigator.onLine);
  testing.expectEqual(true, navigator.cookieEnabled);
  testing.expectEqual(true, navigator.hardwareConcurrency > 0);
  testing.expectEqual(4, navigator.hardwareConcurrency);
  testing.expectEqual(0, navigator.maxTouchPoints);
  testing.expectEqual('', navigator.vendor);
  testing.expectEqual('Gecko', navigator.product);
  testing.expectEqual(false, navigator.javaEnabled());
  testing.expectEqual(false, navigator.webdriver);

  testing.expectEqual(null, navigator.doNotTrack);

  // GPC must default to false — per https://w3c.github.io/gpc/#javascript-property
  // the signal reflects an explicit user preference (Firefox defaults to false;
  // Chrome doesn't expose the property at all). A true default makes
  // GPC-compliant consent managers reject-all and skip their consent UI.
  testing.expectEqual(false, navigator.globalPrivacyControl);

  // Every Navigator attribute must be a native accessor on the prototype
  for (const name of [
    'userAgent', 'appName', 'appCodeName', 'appVersion', 'platform',
    'language', 'languages', 'onLine', 'cookieEnabled', 'hardwareConcurrency',
    'deviceMemory', 'maxTouchPoints', 'vendor', 'product', 'webdriver',
    'plugins', 'doNotTrack', 'globalPrivacyControl',
  ]) {
    const desc = Object.getOwnPropertyDescriptor(Navigator.prototype, name);
    testing.expectEqual('function', typeof desc.get); // accessor on prototype
    testing.expectEqual(undefined, desc.value);        // not a data property
    testing.expectEqual(undefined, Object.getOwnPropertyDescriptor(navigator, name)); // not own
    testing.expectEqual(true, desc.get.toString().includes('[native code]'));
  }
</script>

<script id=navigator_native_descriptor_walk>
  // Mirror the bot-detection fingerprint: read every navigator property's
  // descriptor and call toString() on its value/getter. This must not throw.
  let obj = navigator;
  do {
    for (const name of Object.getOwnPropertyNames(obj)) {
      const d = Object.getOwnPropertyDescriptor(obj, name);
      if (d.value !== undefined) { d.value.toString(); }
      else if (d.get !== undefined) { d.get.toString(); }
    }
  } while (obj = Object.getPrototypeOf(obj));
  testing.expectEqual(null, navigator.doNotTrack);
</script>

<script id=permission_query type=module>
  {
    const state = await testing.async();
    const p = navigator.permissions.query({ name: 'notifications' });
    testing.expectTrue(p instanceof Promise);
    const status = await p;
    state.resolve();

    await state.done(() => {
      testing.expectEqual('prompt', status.state);
      testing.expectEqual('notifications', status.name);
    });
  }
</script>

<script id=storage_estimate type=module>
  {
    const state = await testing.async();

    const p = navigator.storage.estimate();
    testing.expectTrue(p instanceof Promise);

    const estimate = await p;
    state.resolve();

    await state.done(() =>{
      testing.expectEqual(0, estimate.usage);
      testing.expectEqual(1024 * 1024 * 1024, estimate.quota);
    });
  }
</script>

<script id=deviceMemory>
  testing.expectEqual(8, navigator.deviceMemory);
</script>

<script id=userAgentData>
  testing.expectEqual(true, navigator.userAgentData !== undefined);
  testing.expectEqual(false, navigator.userAgentData.mobile);
  testing.expectEqual(true, navigator.userAgentData.platform.length > 0);

  const validUAPlatforms = ['macOS', 'Windows', 'Linux', 'FreeBSD', 'Unknown'];
  testing.expectEqual(true, validUAPlatforms.includes(navigator.userAgentData.platform));

  testing.expectEqual(1, navigator.userAgentData.brands.length);
  testing.expectEqual({brand: 'Lightpanda', version: "1"}, navigator.userAgentData.brands[0]);

  // Same instance returned on repeated access
  testing.expectEqual(true, navigator.userAgentData === navigator.userAgentData);

  const json = navigator.userAgentData.toJSON();
  testing.expectEqual(false, json.mobile);
  testing.expectEqual(navigator.userAgentData.platform, json.platform);
  testing.expectEqual(true, Array.isArray(json.brands));
  testing.expectEqual('Lightpanda', json.brands[0].brand);
</script>

<script id=userAgentData_highEntropy type=module>
  {
    const state = await testing.async();
    const p = navigator.userAgentData.getHighEntropyValues(['architecture', 'platformVersion', 'fullVersionList']);
    testing.expectTrue(p instanceof Promise);
    const v = await p;
    state.resolve();

    await state.done(() => {
      testing.expectEqual(false, v.mobile);
      testing.expectEqual(navigator.userAgentData.platform, v.platform);
      testing.expectEqual(true, Array.isArray(v.brands));
      testing.expectEqual(true, Array.isArray(v.fullVersionList));
      testing.expectEqual('Lightpanda', v.fullVersionList[0].brand);
      testing.expectEqual('1.0.0.0', v.uaFullVersion);
      testing.expectEqual(false, v.wow64);
      testing.expectEqual(true, Array.isArray(v.formFactor));
      testing.expectEqual('Desktop', v.formFactor[0]);
    });
  }
</script>

<script id=getBattery type=module>
  // Like Firefox, we don't expose navigator.getBattery. Sites already
  // have to handle it being undefined, so this is a real-browser shape
  // rather than a stub that always rejects.
  testing.expectEqual('undefined', typeof navigator.getBattery);
</script>
