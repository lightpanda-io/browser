<script id=navigator_user_agent_data>
  testing.async(async () => {
    testing.expectEqual('object', typeof navigator.userAgentData);
    testing.expectEqual(true, Array.isArray(navigator.userAgentData.brands));
    testing.expectEqual(true, navigator.userAgentData.brands.length >= 1);
    testing.expectEqual('boolean', typeof navigator.userAgentData.mobile);
    testing.expectEqual(true, navigator.userAgentData.platform.length > 0);
    testing.expectEqual('function', typeof navigator.userAgentData.getHighEntropyValues);
    testing.expectEqual('function', typeof navigator.userAgentData.toJSON);
    testing.expectEqual(true, navigator.userAgentData.brands.some(v => v.brand === 'Chromium'));
    testing.expectEqual(true, navigator.userAgentData.brands.some(v => v.brand === 'Google Chrome'));

    const json = navigator.userAgentData.toJSON();
    testing.expectEqual(true, Array.isArray(json.brands));
    testing.expectEqual(false, json.mobile);
    testing.expectEqual(navigator.userAgentData.platform, json.platform);

    const highEntropy = await navigator.userAgentData.getHighEntropyValues([
      'architecture',
      'bitness',
      'model',
      'platform',
      'platformVersion',
      'uaFullVersion',
      'wow64',
    ]);
    testing.expectEqual(true, Array.isArray(highEntropy.brands));
    testing.expectEqual(true, highEntropy.brands.some(v => v.brand === 'Chromium'));
    testing.expectEqual(true, highEntropy.brands.some(v => v.brand === 'Google Chrome'));
    testing.expectEqual(false, highEntropy.mobile);
    testing.expectEqual(true, highEntropy.architecture.length > 0);
    testing.expectEqual(true, highEntropy.bitness === '64' || highEntropy.bitness === '32' || highEntropy.bitness === '0');
    testing.expectEqual('', highEntropy.model);
    testing.expectEqual(navigator.userAgentData.platform, highEntropy.platform);
    testing.expectEqual(true, highEntropy.platformVersion.length > 0);
    testing.expectEqual('146.0.7680.178', highEntropy.uaFullVersion);
    testing.expectEqual(false, highEntropy.wow64);

    const permission = await navigator.permissions.query({ name: 'geolocation' });
    testing.expectEqual('prompt', permission.state);

    testing.expectEqual(null, await navigator.credentials.get({ password: true }));
    testing.expectEqual(null, await navigator.credentials.create({ password: true }));
    testing.expectEqual(null, await navigator.credentials.store({}));
    await navigator.credentials.preventSilentAccess();

    const estimate = await navigator.storage.estimate();
    testing.expectEqual(true, estimate.quota > 0);
    testing.expectEqual(0, estimate.usage);
    testing.expectEqual(false, await navigator.storage.persist());
    testing.expectEqual(false, await navigator.storage.persisted());

    const decoding = await navigator.mediaCapabilities.decodingInfo({ type: 'file' });
    testing.expectEqual(false, decoding.supported);
    testing.expectEqual(false, decoding.smooth);
    testing.expectEqual(false, decoding.powerEfficient);

    const encoding = await navigator.mediaCapabilities.encodingInfo({ type: 'record' });
    testing.expectEqual(false, encoding.supported);
    testing.expectEqual(false, encoding.smooth);
    testing.expectEqual(false, encoding.powerEfficient);

    const battery = await navigator.getBattery();
    testing.expectEqual(true, battery.charging);
    testing.expectEqual(1, battery.level);

    testing.expectEqual(null, await navigator.serviceWorker.getRegistration());
    testing.expectEqual(0, (await navigator.serviceWorker.getRegistrations()).length);
    testing.expectEqual(null, await navigator.gpu.requestAdapter());
    testing.expectEqual('rgba8unorm', navigator.gpu.getPreferredCanvasFormat());
    testing.expectEqual(false, await navigator.xr.isSessionSupported('inline'));

    const layoutMap = await navigator.keyboard.getLayoutMap();
    testing.expectEqual('function', typeof layoutMap.get);
    testing.expectEqual('KeyA', layoutMap.get('KeyA'));
    testing.expectEqual(false, layoutMap.has('KeyA'));
    await navigator.keyboard.lock(['Escape']);
    navigator.keyboard.unlock();

    testing.expectErrorAsync('NotAllowedError', () => navigator.clipboard.read());
    testing.expectErrorAsync('NotAllowedError', () => navigator.clipboard.readText());
    testing.expectErrorAsync('NotAllowedError', () => navigator.clipboard.write([]));
    testing.expectErrorAsync('NotAllowedError', () => navigator.clipboard.writeText('x'));

    testing.expectEqual(null, navigator.presentation.defaultRequest);
    testing.expectEqual(null, navigator.presentation.receiver);

    testing.expectEqual(0, (await navigator.storageBuckets.keys()).length);
    const bucket = await navigator.storageBuckets.open('default');
    testing.expectEqual('function', typeof bucket.estimate);
    testing.expectEqual(false, await bucket.persist());
    testing.expectEqual(false, await bucket.persisted());
    const bucketEstimate = await bucket.estimate();
    testing.expectEqual(true, bucketEstimate.quota > 0);
    testing.expectEqual(0, bucketEstimate.usage);
    testing.expectEqual(false, await navigator.storageBuckets.delete('default'));

    navigator.geolocation.getCurrentPosition(() => testing.fail('geolocation success should not run'), (err) => testing.expectEqual('NotAllowedError', err.name));
    testing.expectEqual(0, navigator.geolocation.watchPosition(() => testing.fail('watchPosition success should not run'), (err) => testing.expectEqual('NotAllowedError', err.name)));
    navigator.geolocation.clearWatch(0);

    testing.expectEqual(false, await navigator.bluetooth.getAvailability());
    testing.expectErrorAsync('NotFoundError', () => navigator.bluetooth.requestDevice({ acceptAllDevices: true }));
    testing.expectEqual(0, (await navigator.hid.getDevices()).length);
    testing.expectEqual(0, (await navigator.hid.requestDevice({ filters: [] })).length);
    testing.expectEqual(0, (await navigator.usb.getDevices()).length);
    testing.expectErrorAsync('NotFoundError', () => navigator.usb.requestDevice({ filters: [] }));
    testing.expectEqual(0, (await navigator.serial.getPorts()).length);
    testing.expectErrorAsync('NotFoundError', () => navigator.serial.requestPort());

    const locks = await navigator.locks.query();
    testing.expectEqual(0, locks.held.length);
    testing.expectEqual(0, locks.pending.length);
    testing.expectErrorAsync('NotSupportedError', () => navigator.locks.request('x', () => {}));

    testing.expectEqual(false, navigator.windowControlsOverlay.visible);
    const titlebarRect = navigator.windowControlsOverlay.getTitlebarAreaRect();
    testing.expectEqual(0, titlebarRect.x);
    testing.expectEqual(0, titlebarRect.y);
    testing.expectEqual(0, titlebarRect.width);
    testing.expectEqual(0, titlebarRect.height);

    testing.expectEqual(null, await navigator.setAppBadge());
    testing.expectEqual(null, await navigator.clearAppBadge());
    testing.expectEqual(0, (await navigator.getInstalledRelatedApps()).length);
    testing.expectEqual(null, await navigator.getInterestGroupAdAuctionData());
    testing.expectEqual(null, await navigator.joinAdInterestGroup());
    testing.expectEqual(null, await navigator.leaveAdInterestGroup());
    testing.expectEqual(null, await navigator.clearOriginJoinedAdInterestGroups());
    testing.expectEqual(null, await navigator.updateAdInterestGroups());
    testing.expectEqual(null, await navigator.runAdAuction());
    testing.expectEqual(false, navigator.canLoadAdAuctionFencedFrame());
    testing.expectEqual(true, navigator.createAuctionNonce().length > 0);
    testing.expectEqual(null, navigator.deprecatedReplaceInURN());
    testing.expectEqual(false, navigator.deprecatedRunAdAuctionEnforcesKAnonymity());
    testing.expectEqual(null, navigator.deprecatedURNToURL());
    testing.expectEqual(null, await navigator.protectedAudience.runAdAuction());
    testing.expectEqual(null, await navigator.protectedAudience.joinAdInterestGroup());
    testing.expectEqual(null, await navigator.protectedAudience.leaveAdInterestGroup());
    testing.expectEqual(null, await navigator.protectedAudience.clearOriginJoinedAdInterestGroups());
    testing.expectEqual(null, await navigator.protectedAudience.updateAdInterestGroups());

    testing.expectErrorAsync('NotSupportedError', () => navigator.serviceWorker.ready);
    testing.expectErrorAsync('NotSupportedError', () => navigator.serviceWorker.register('/sw.js'));
    testing.expectErrorAsync('NotAllowedError', () => navigator.share({ title: 'x' }));
    testing.expectErrorAsync('NotSupportedError', () => navigator.requestMIDIAccess());
    testing.expectErrorAsync('NotSupportedError', () => navigator.requestMediaKeySystemAccess('org.w3.clearkey', [{}]));
    testing.expectErrorAsync('NotAllowedError', () => navigator.wakeLock.request('screen'));
    testing.expectErrorAsync('NotSupportedError', () => navigator.xr.requestSession('immersive-vr'));
  });
</script>

<script id=navigator_webkit_storage>
  testing.async(async () => {
    await new Promise((resolve) => {
      navigator.webkitTemporaryStorage.queryUsageAndQuota(
        () => testing.fail('temporary queryUsageAndQuota should not resolve'),
        (err) => {
          testing.expectEqual('NotSupportedError', err.name);
          resolve();
        },
      );
    });

    await new Promise((resolve) => {
      navigator.webkitTemporaryStorage.requestQuota(
        12345,
        () => testing.fail('temporary requestQuota should not resolve'),
        (err) => {
          testing.expectEqual('AbortError', err.name);
          resolve();
        },
      );
    });

    await new Promise((resolve) => {
      navigator.webkitPersistentStorage.queryUsageAndQuota(
        () => testing.fail('persistent queryUsageAndQuota should not resolve'),
        (err) => {
          testing.expectEqual('NotSupportedError', err.name);
          resolve();
        },
      );
    });

    await new Promise((resolve) => {
      navigator.webkitPersistentStorage.requestQuota(
        12345,
        () => testing.fail('persistent requestQuota should not resolve'),
        (err) => {
          testing.expectEqual('AbortError', err.name);
          resolve();
        },
      );
    });
  });
</script>
