<!DOCTYPE html>
<script src="../testing.js"></script>

<script id=window>
  testing.expectEqual(window, globalThis);
  testing.expectEqual(window, self);
  testing.expectEqual(window, window.self);
  testing.expectEqual(null, window.opener);
  testing.expectEqual('function', typeof window.open);
  testing.expectEqual(0, window.TEMPORARY);
  testing.expectEqual(1, window.PERSISTENT);

  const open_ref = window.open;
  testing.expectEqual('function', typeof open_ref);
  testing.expectEqual('function', eval('typeof window.open'));

  testing.expectEqual(1080, innerHeight);
  testing.expectEqual(1920, innerWidth);
</script>

<script id=window_open_handler_reference>
  const button = document.createElement('button');
  button.id = 'window-open-handler-reference';
  button.onclick = function() {
    return window.open;
  };
  testing.expectEqual('function', typeof button.onclick);
  testing.expectEqual('function', typeof button.onclick());
</script>

<script id=window_open_handler_eval_reference>
  const eval_button = document.createElement('button');
  eval_button.id = 'window-open-handler-eval-reference';
  eval_button.onclick = function() {
    return eval('typeof window.open');
  };
  testing.expectEqual('function', typeof eval_button.onclick);
  testing.expectEqual('function', eval_button.onclick());
</script>

<script id=load>
  let call1 = 0;
  let call2 = 0;
  window.onload = function(e) {
    testing.expectEqual(false, true); // should not be called
  }

  const fn = function(e) {
    call1 += 1;
    testing.expectEqual(window, this);
    testing.expectEqual(document, e.target);
    testing.expectEqual(window, e.currentTarget);
  };
  window.onload = fn;
  testing.expectEqual(fn, window.onload);

  window.addEventListener('load', (e) => {
    call2 += 1;
    testing.expectEqual(window, this);
    testing.expectEqual(document, e.target);
    testing.expectEqual(window, e.currentTarget);
  });

  window.addEventListener('load', function(e) {
    call2 += 1;
    testing.expectEqual(window, this);
    testing.expectEqual(document, e.target);
    testing.expectEqual(window, e.currentTarget);
  });

  // noop
  window.removeEventListener('load', fn);
  testing.eventually(() => {
    testing.expectEqual(1, call1);
    testing.expectEqual(2, call2);
  });
</script>

<script id=btoa>
  testing.expectEqual('SGVsbG8gV29ybGQh', btoa('Hello World!'));
  testing.expectEqual('', btoa(''));
  testing.expectEqual('IA==', btoa(' '));
  testing.expectEqual('YQ==', btoa('a'));
  testing.expectEqual('YWI=', btoa('ab'));
  testing.expectEqual('YWJj', btoa('abc'));
  testing.expectEqual('MDEyMzQ1Njc4OQ==', btoa('0123456789'));
  testing.expectEqual('VGhlIHF1aWNrIGJyb3duIGZveCBqdW1wcyBvdmVyIHRoZSBsYXp5IGRvZw==', btoa('The quick brown fox jumps over the lazy dog'));
</script>

<script id=atob>
  testing.expectEqual('Hello World!', atob('SGVsbG8gV29ybGQh'));
  testing.expectEqual('', atob(''));

  // atob must trim input
  testing.expectEqual('', atob(' '));
  testing.expectEqual(' ', atob('IA=='));
  testing.expectEqual(' ', atob(' IA=='));
  testing.expectEqual(' ', atob('IA== '));

  testing.expectEqual('a', atob('YQ=='));
  testing.expectEqual('ab', atob('YWI='));
  testing.expectEqual('abc', atob('YWJj'));
  testing.expectEqual('0123456789', atob('MDEyMzQ1Njc4OQ=='));
  testing.expectEqual('The quick brown fox jumps over the lazy dog', atob('VGhlIHF1aWNrIGJyb3duIGZveCBqdW1wcyBvdmVyIHRoZSBsYXp5IGRvZw=='));

  // atob must accept unpadded base64 (forgiving-base64 decode per HTML spec)
  testing.expectEqual('a', atob('YQ'));      // 2 chars, len%4==2, needs '=='
  testing.expectEqual('ab', atob('YWI'));    // 3 chars, len%4==3, needs '='
  testing.expectEqual('ceil', atob('Y2VpbA'));  // 6 chars, len%4==2, needs '=='

  // length % 4 == 1 must still throw
  testing.expectError('Error: InvalidCharacterError', () => {
    atob('Y');
  });
</script>

<script id=btoa_atob_roundtrip>
  const testStrings = [
    'Hello World!',
    'Test 123',
    '',
    'a',
    'The quick brown fox jumps over the lazy dog',
    '!@#$%^&*()',
  ];

  for (const str of testStrings) {
    testing.expectEqual(str, atob(btoa(str)));
  }

  const testEncoded = [
    'SGVsbG8gV29ybGQh',
    'VGVzdCAxMjM=',
    '',
    'YQ==',
    'VGhlIHF1aWNrIGJyb3duIGZveCBqdW1wcyBvdmVyIHRoZSBsYXp5IGRvZw==',
    'IUAjJCVeJiooKQ==',
  ];

  for (const enc of testEncoded) {
    testing.expectEqual(enc, btoa(atob(enc)));
  }
</script>

<script id=trusted_types>
  testing.expectEqual('object', typeof trustedTypes);
  testing.expectEqual(trustedTypes, window.trustedTypes);
  testing.expectEqual(false, trustedTypes === crypto);
  testing.expectEqual('function', typeof trustedTypes.createPolicy);
  testing.expectEqual('undefined', typeof trustedTypes.getRandomValues);
  testing.expectEqual(null, trustedTypes.defaultPolicy);
  testing.expectEqual('function', typeof crypto.getRandomValues);
  testing.expectEqual('object', typeof crypto.subtle);

  const rules = {
    createHTML(value) { return value; },
    createScript(value) { return value; },
  };
  const policy = trustedTypes.createPolicy('lightpanda-test', rules);
  testing.expectEqual(rules, policy);
  testing.expectEqual('<b>ok</b>', policy.createHTML('<b>ok</b>'));
  testing.expectEqual('console.log(1)', policy.createScript('console.log(1)'));
</script>

<script id=compression_stream>

  const gzip = new CompressionStream('gzip');
  testing.expectEqual('object', typeof gzip.readable);
  testing.expectEqual('object', typeof gzip.writable);
</script>

<script id=structured_clone>
  const original = {
    name: 'Lightpanda',
    nested: { count: 2, ok: true },
    items: [1, { deep: 'value' }],
  };
  const copy = structuredClone(original);
  testing.expectEqual(original, copy);
  testing.expectEqual(false, copy === original);
  testing.expectEqual(false, copy.nested === original.nested);
  testing.expectEqual(false, copy.items === original.items);
  testing.expectEqual(false, copy.items[1] === original.items[1]);
  testing.expectEqual(undefined, structuredClone(undefined));
  testing.expectEqual(null, structuredClone(null));
  testing.expectEqual('abc', structuredClone('abc'));
  testing.expectEqual(12, structuredClone(12));
</script>

<script id=unhandled_rejection>
  {
    let unhandledCalled = 0;
    window.onunhandledrejection = function(e) {
      testing.expectEqual(true, e instanceof PromiseRejectionEvent);
      testing.expectEqual({x: 'Fail'}, e.reason);
      testing.expectEqual('unhandledrejection', e.type);
      testing.expectEqual(window, e.target);
      testing.expectEqual(window, e.srcElement);
      testing.expectEqual(window, e.currentTarget);
      unhandledCalled += 1;
    }

    window.addEventListener('unhandledrejection', function(e) {
      testing.expectEqual(true, e instanceof PromiseRejectionEvent);
      testing.expectEqual({x: 'Fail'}, e.reason);
      testing.expectEqual('unhandledrejection', e.type);
      testing.expectEqual(window, e.target);
      testing.expectEqual(window, e.srcElement);
      testing.expectEqual(window, e.currentTarget);
      unhandledCalled += 1;
    });
    Promise.reject({x: 'Fail'});
    testing.eventually(() => testing.expectEqual(2, unhandledCalled));
  }
</script>
