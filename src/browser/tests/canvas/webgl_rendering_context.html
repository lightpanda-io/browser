<!DOCTYPE html>
<script src="../testing.js"></script>

<script id=WebGLRenderingContext#getSupportedExtensions>
{
  const element = document.createElement("canvas");
  const ctx = element.getContext("webgl");
  testing.expectEqual(true, ctx instanceof WebGLRenderingContext);

  const supportedExtensions = ctx.getSupportedExtensions();
  // The order Chrome prefer.
  const expectedExtensions = [
      "ANGLE_instanced_arrays",
      "EXT_blend_minmax",
      "EXT_clip_control",
      "EXT_color_buffer_half_float",
      "EXT_depth_clamp",
      "EXT_disjoint_timer_query",
      "EXT_float_blend",
      "EXT_frag_depth",
      "EXT_polygon_offset_clamp",
      "EXT_shader_texture_lod",
      "EXT_texture_compression_bptc",
      "EXT_texture_compression_rgtc",
      "EXT_texture_filter_anisotropic",
      "EXT_texture_mirror_clamp_to_edge",
      "EXT_sRGB",
      "KHR_parallel_shader_compile",
      "OES_element_index_uint",
      "OES_fbo_render_mipmap",
      "OES_standard_derivatives",
      "OES_texture_float",
      "OES_texture_float_linear",
      "OES_texture_half_float",
      "OES_texture_half_float_linear",
      "OES_vertex_array_object",
      "WEBGL_blend_func_extended",
      "WEBGL_color_buffer_float",
      "WEBGL_compressed_texture_astc",
      "WEBGL_compressed_texture_etc",
      "WEBGL_compressed_texture_etc1",
      "WEBGL_compressed_texture_pvrtc",
      "WEBGL_compressed_texture_s3tc",
      "WEBGL_compressed_texture_s3tc_srgb",
      "WEBGL_debug_renderer_info",
      "WEBGL_debug_shaders",
      "WEBGL_depth_texture",
      "WEBGL_draw_buffers",
      "WEBGL_lose_context",
      "WEBGL_multi_draw",
      "WEBGL_polygon_mode"
  ];

  testing.expectEqual(expectedExtensions.length, supportedExtensions.length);
  for (let i = 0; i < expectedExtensions.length; i++) {
    testing.expectEqual(expectedExtensions[i], supportedExtensions[i]);
  }
}
</script>

<script id=WebGLRenderingCanvas#getExtension>
// WEBGL_debug_renderer_info
{
  const element = document.createElement("canvas");
  const ctx = element.getContext("webgl");
  const rendererInfo = ctx.getExtension("WEBGL_debug_renderer_info");
  testing.expectEqual(true, rendererInfo instanceof WEBGL_debug_renderer_info);

  const { UNMASKED_VENDOR_WEBGL, UNMASKED_RENDERER_WEBGL } = rendererInfo;
  testing.expectEqual(UNMASKED_VENDOR_WEBGL, 0x9245);
  testing.expectEqual(UNMASKED_RENDERER_WEBGL, 0x9246);

  testing.expectEqual("", ctx.getParameter(UNMASKED_VENDOR_WEBGL));
  testing.expectEqual("", ctx.getParameter(UNMASKED_RENDERER_WEBGL));
}

// WEBGL_lose_context
{
  const element = document.createElement("canvas");
  const ctx = element.getContext("webgl");
  const loseContext = ctx.getExtension("WEBGL_lose_context");
  testing.expectEqual(true, loseContext instanceof WEBGL_lose_context);

  loseContext.loseContext();
  loseContext.restoreContext();
}
</script>

<script id=WebGLRenderingContext#clearColor_clear>
{
  const element = document.createElement("canvas");
  element.width = 4;
  element.height = 3;
  const ctx = element.getContext("webgl");
  testing.expectEqual(0x00004000, ctx.COLOR_BUFFER_BIT);
  ctx.clearColor(1, 0, 0, 1);
  ctx.clear(ctx.COLOR_BUFFER_BIT);
}
</script>

<script id=WebGLRenderingContext#drawingBuffer_dimensions_resize>
{
  const element = document.createElement("canvas");
  element.width = 7;
  element.height = 5;
  const ctx = element.getContext("webgl");

  testing.expectEqual(7, ctx.drawingBufferWidth);
  testing.expectEqual(5, ctx.drawingBufferHeight);

  element.width = 11;
  element.height = 9;
  testing.expectEqual(11, ctx.drawingBufferWidth);
  testing.expectEqual(9, ctx.drawingBufferHeight);

  ctx.clearColor(0, 0.5, 1, 1);
  ctx.clear(ctx.COLOR_BUFFER_BIT);
}
</script>

<script id=WebGLRenderingContext#shader_program_drawArrays>
{
  const element = document.createElement("canvas");
  element.width = 64;
  element.height = 64;
  const gl = element.getContext("webgl");

  const vertexShader = gl.createShader(gl.VERTEX_SHADER);
  testing.expectEqual(true, vertexShader instanceof WebGLShader);
  gl.shaderSource(vertexShader, `
    attribute vec2 a_position;
    void main() {
      gl_Position = vec4(a_position, 0.0, 1.0);
    }
  `);
  gl.compileShader(vertexShader);
  testing.expectEqual(true, gl.getShaderParameter(vertexShader, gl.COMPILE_STATUS));

  const fragmentShader = gl.createShader(gl.FRAGMENT_SHADER);
  testing.expectEqual(true, fragmentShader instanceof WebGLShader);
  gl.shaderSource(fragmentShader, `
    void main() {
      gl_FragColor = vec4(1.0, 0.0, 0.0, 1.0);
    }
  `);
  gl.compileShader(fragmentShader);
  testing.expectEqual(true, gl.getShaderParameter(fragmentShader, gl.COMPILE_STATUS));

  const program = gl.createProgram();
  testing.expectEqual(true, program instanceof WebGLProgram);
  gl.attachShader(program, vertexShader);
  gl.attachShader(program, fragmentShader);
  gl.linkProgram(program);
  testing.expectEqual(true, gl.getProgramParameter(program, gl.LINK_STATUS));

  const buffer = gl.createBuffer();
  testing.expectEqual(true, buffer instanceof WebGLBuffer);
  gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
    -0.75, -0.75,
     0.75, -0.75,
     0.00,  0.80,
  ]), gl.STATIC_DRAW);

  const location = gl.getAttribLocation(program, "a_position");
  testing.expectEqual(0, location);
  gl.useProgram(program);
  gl.viewport(0, 0, 64, 64);
  gl.clearColor(1, 1, 1, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.enableVertexAttribArray(location);
  gl.vertexAttribPointer(location, 2, gl.FLOAT, false, 0, 0);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}
</script>

<script id=WebGLRenderingContext#shader_program_drawElements_uniform4f>
{
  const element = document.createElement("canvas");
  element.width = 64;
  element.height = 64;
  const gl = element.getContext("webgl");

  const vertexShader = gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vertexShader, `
    attribute vec2 a_position;
    void main() {
      gl_Position = vec4(a_position, 0.0, 1.0);
    }
  `);
  gl.compileShader(vertexShader);
  testing.expectEqual(true, gl.getShaderParameter(vertexShader, gl.COMPILE_STATUS));

  const fragmentShader = gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fragmentShader, `
    uniform vec4 u_color;
    void main() {
      gl_FragColor = u_color;
    }
  `);
  gl.compileShader(fragmentShader);
  testing.expectEqual(true, gl.getShaderParameter(fragmentShader, gl.COMPILE_STATUS));

  const program = gl.createProgram();
  gl.attachShader(program, vertexShader);
  gl.attachShader(program, fragmentShader);
  gl.linkProgram(program);
  testing.expectEqual(true, gl.getProgramParameter(program, gl.LINK_STATUS));

  const vertices = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, vertices);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
    -0.75, -0.75,
     0.75, -0.75,
     0.00,  0.80,
  ]), gl.STATIC_DRAW);

  const elements = gl.createBuffer();
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, elements);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array([0, 1, 2]), gl.STATIC_DRAW);

  const location = gl.getAttribLocation(program, "a_position");
  testing.expectEqual(0, location);
  const colorLocation = gl.getUniformLocation(program, "u_color");
  testing.expectEqual(true, !!colorLocation);

  gl.useProgram(program);
  gl.viewport(0, 0, 64, 64);
  gl.clearColor(1, 1, 1, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.enableVertexAttribArray(location);
  gl.vertexAttribPointer(location, 2, gl.FLOAT, false, 0, 0);
  gl.uniform4f(colorLocation, 0.0, 0.0, 1.0, 1.0);
  gl.drawElements(gl.TRIANGLES, 3, gl.UNSIGNED_SHORT, 0);
}
</script>

<script id=WebGLRenderingContext#shader_program_varying_color_attribute>
{
  const element = document.createElement("canvas");
  element.width = 64;
  element.height = 64;
  const gl = element.getContext("webgl");

  const vertexShader = gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vertexShader, `
    attribute vec2 a_position;
    attribute vec3 a_color;
    varying vec3 v_color;
    void main() {
      v_color = a_color;
      gl_Position = vec4(a_position, 0.0, 1.0);
    }
  `);
  gl.compileShader(vertexShader);
  testing.expectEqual(true, gl.getShaderParameter(vertexShader, gl.COMPILE_STATUS));

  const fragmentShader = gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fragmentShader, `
    varying vec3 v_color;
    void main() {
      gl_FragColor = vec4(v_color, 1.0);
    }
  `);
  gl.compileShader(fragmentShader);
  testing.expectEqual(true, gl.getShaderParameter(fragmentShader, gl.COMPILE_STATUS));

  const program = gl.createProgram();
  gl.attachShader(program, vertexShader);
  gl.attachShader(program, fragmentShader);
  gl.linkProgram(program);
  testing.expectEqual(true, gl.getProgramParameter(program, gl.LINK_STATUS));

  const buffer = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
    -0.75, -0.75, 1.0, 0.0, 0.0,
     0.75, -0.75, 0.0, 1.0, 0.0,
     0.00,  0.80, 0.0, 0.0, 1.0,
  ]), gl.STATIC_DRAW);

  const position = gl.getAttribLocation(program, "a_position");
  const color = gl.getAttribLocation(program, "a_color");
  testing.expectEqual(0, position);
  testing.expectEqual(1, color);

  gl.useProgram(program);
  gl.viewport(0, 0, 64, 64);
  gl.clearColor(1, 1, 1, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.enableVertexAttribArray(position);
  gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 20, 0);
  gl.enableVertexAttribArray(color);
  gl.vertexAttribPointer(color, 3, gl.FLOAT, false, 20, 8);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}
</script>
