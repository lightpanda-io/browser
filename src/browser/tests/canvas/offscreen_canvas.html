<!DOCTYPE html>
<script src="../testing.js"></script>

<script id=OffscreenCanvas>
{
  const canvas = new OffscreenCanvas(256, 256);
  testing.expectEqual(true, canvas instanceof OffscreenCanvas);
  testing.expectEqual(canvas.width, 256);
  testing.expectEqual(canvas.height, 256);
}
</script>

<script id=OffscreenCanvas#width>
{
  const canvas = new OffscreenCanvas(100, 200);
  testing.expectEqual(canvas.width, 100);
  canvas.width = 300;
  testing.expectEqual(canvas.width, 300);
}
</script>

<script id=OffscreenCanvas#height>
{
  const canvas = new OffscreenCanvas(100, 200);
  testing.expectEqual(canvas.height, 200);
  canvas.height = 400;
  testing.expectEqual(canvas.height, 400);
}
</script>

<script id=OffscreenCanvas#getContext>
{
  const canvas = new OffscreenCanvas(64, 64);
  const ctx = canvas.getContext("2d");
  const ctx2 = canvas.getContext("2d");
  testing.expectEqual(true, ctx instanceof OffscreenCanvasRenderingContext2D);
  testing.expectEqual(true, ctx === ctx2);
  ctx.fillRect(0, 0, 10, 10);
}
</script>

<script id=OffscreenCanvasRenderingContext2D#fillRect>
{
  const canvas = new OffscreenCanvas(16, 16);
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#00ff00";
  ctx.fillRect(1, 2, 3, 4);
  const sample = ctx.getImageData(1, 2, 1, 1);
  testing.expectEqual(sample.data[0], 0);
  testing.expectEqual(sample.data[1], 255);
  testing.expectEqual(sample.data[2], 0);
  testing.expectEqual(sample.data[3], 255);
}
</script>

<script id=OffscreenCanvasRenderingContext2D#putImageData>
{
  const canvas = new OffscreenCanvas(16, 16);
  const ctx = canvas.getContext("2d");
  const imageData = ctx.createImageData(2, 1);
  imageData.data[0] = 20;
  imageData.data[1] = 30;
  imageData.data[2] = 40;
  imageData.data[3] = 255;
  imageData.data[4] = 50;
  imageData.data[5] = 60;
  imageData.data[6] = 70;
  imageData.data[7] = 255;
  ctx.putImageData(imageData, 4, 5);
  const sample = ctx.getImageData(4, 5, 2, 1);
  testing.expectEqual(sample.data[0], 20);
  testing.expectEqual(sample.data[1], 30);
  testing.expectEqual(sample.data[2], 40);
  testing.expectEqual(sample.data[4], 50);
  testing.expectEqual(sample.data[5], 60);
  testing.expectEqual(sample.data[6], 70);
}
</script>

<script id=OffscreenCanvas#resize clears bitmap>
{
  const canvas = new OffscreenCanvas(16, 16);
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#ff0000";
  ctx.fillRect(0, 0, 4, 4);
  canvas.width = 32;
  const same = canvas.getContext("2d");
  const sample = same.getImageData(0, 0, 1, 1);
  testing.expectEqual(true, ctx === same);
  testing.expectEqual(sample.data[3], 0);
}
</script>

<script id=OffscreenCanvas#convertToBlob>
{
  const canvas = new OffscreenCanvas(64, 64);
  const promise = canvas.convertToBlob();
  testing.expectEqual(true, promise instanceof Promise);
  // The promise should resolve to a Blob (even if empty)
  promise.then(blob => {
    testing.expectEqual(true, blob instanceof Blob);
    testing.expectEqual(blob.size, 0); // Empty since no rendering
  });
}
</script>

<script id=HTMLCanvasElement#transferControlToOffscreen>
{
  const htmlCanvas = document.createElement("canvas");
  htmlCanvas.width = 128;
  htmlCanvas.height = 96;
  const offscreen = htmlCanvas.transferControlToOffscreen();
  testing.expectEqual(true, offscreen instanceof OffscreenCanvas);
  testing.expectEqual(offscreen.width, 128);
  testing.expectEqual(offscreen.height, 96);
}
</script>
