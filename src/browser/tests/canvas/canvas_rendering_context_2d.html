<!DOCTYPE html>
<script src="../testing.js"></script>

<script id=CanvasRenderingContext2D>
{
  const element = document.createElement("canvas");
  const ctx = element.getContext("2d");
  const ctx2 = element.getContext("2d");
  testing.expectEqual(true, ctx instanceof CanvasRenderingContext2D);
  testing.expectEqual(true, ctx === ctx2);
  testing.expectEqual(null, element.getContext("webgl"));
  ctx.fillRect(0, 0, 0, 0);
}
</script>

<script id=CanvasRenderingContext2D#fillStyle>
{
  const element = document.createElement("canvas");
  const ctx = element.getContext("2d");

  // Black by default.
  testing.expectEqual(ctx.fillStyle, "#000000");
  ctx.fillStyle = "red";
  testing.expectEqual(ctx.fillStyle, "#ff0000");
  ctx.fillStyle = "rebeccapurple";
  testing.expectEqual(ctx.fillStyle, "#663399");
  // No changes made if color is invalid.
  ctx.fillStyle = "invalid-color";
  testing.expectEqual(ctx.fillStyle, "#663399");
  ctx.fillStyle = "#fc0";
  testing.expectEqual(ctx.fillStyle, "#ffcc00");
  ctx.fillStyle = "#ff0000";
  testing.expectEqual(ctx.fillStyle, "#ff0000");
  ctx.fillStyle = "#fF00000F";
  testing.expectEqual(ctx.fillStyle, "rgba(255, 0, 0, 0.06)");
}
</script>

<script id="CanvasRenderingContext2D#createImageData(width, height)">
{
  const element = document.createElement("canvas");
  const ctx = element.getContext("2d");

  const imageData = ctx.createImageData(100, 200);
  testing.expectEqual(true, imageData instanceof ImageData);
  testing.expectEqual(imageData.width, 100);
  testing.expectEqual(imageData.height, 200);
  testing.expectEqual(imageData.data.length, 100 * 200 * 4);
  testing.expectEqual(true, imageData.data instanceof Uint8ClampedArray);

  // All pixels should be initialized to 0.
  testing.expectEqual(imageData.data[0], 0);
  testing.expectEqual(imageData.data[1], 0);
  testing.expectEqual(imageData.data[2], 0);
  testing.expectEqual(imageData.data[3], 0);
}
</script>

<script id="CanvasRenderingContext2D#createImageData(imageData)">
{
  const element = document.createElement("canvas");
  const ctx = element.getContext("2d");

  const source = ctx.createImageData(50, 75);
  const imageData = ctx.createImageData(source);
  testing.expectEqual(true, imageData instanceof ImageData);
  testing.expectEqual(imageData.width, 50);
  testing.expectEqual(imageData.height, 75);
  testing.expectEqual(imageData.data.length, 50 * 75 * 4);
}
</script>

<script id="CanvasRenderingContext2D#putImageData">
{
  const element = document.createElement("canvas");
  const ctx = element.getContext("2d");

  const imageData = ctx.createImageData(10, 10);
  testing.expectEqual(true, imageData instanceof ImageData);
  // Modify some pixel data.
  imageData.data[0] = 255;
  imageData.data[1] = 0;
  imageData.data[2] = 0;
  imageData.data[3] = 255;

  // putImageData should not throw.
  ctx.putImageData(imageData, 0, 0);
  ctx.putImageData(imageData, 10, 20);
  // With dirty rect parameters.
  ctx.putImageData(imageData, 0, 0, 0, 0, 5, 5);
}
</script>

<script id="CanvasRenderingContext2D#fillRect and getImageData">
{
  const element = document.createElement("canvas");
  element.width = 8;
  element.height = 8;
  const ctx = element.getContext("2d");

  ctx.fillStyle = "rgba(255, 0, 0, 0.5)";
  ctx.fillRect(2, 1, 3, 2);

  const imageData = ctx.getImageData(2, 1, 1, 1);
  testing.expectEqual(255, imageData.data[0]);
  testing.expectEqual(0, imageData.data[1]);
  testing.expectEqual(0, imageData.data[2]);
  testing.expectEqual(127, imageData.data[3]);
}
</script>

<script id="CanvasRenderingContext2D#clearRect">
{
  const element = document.createElement("canvas");
  element.width = 8;
  element.height = 8;
  const ctx = element.getContext("2d");

  ctx.fillStyle = "#00ff00";
  ctx.fillRect(0, 0, 8, 8);
  ctx.clearRect(2, 2, 2, 2);

  const cleared = ctx.getImageData(2, 2, 1, 1);
  const filled = ctx.getImageData(1, 1, 1, 1);
  testing.expectEqual(cleared.data[0], 0);
  testing.expectEqual(cleared.data[1], 0);
  testing.expectEqual(cleared.data[2], 0);
  testing.expectEqual(cleared.data[3], 0);
  testing.expectEqual(filled.data[0], 0);
  testing.expectEqual(filled.data[1], 255);
  testing.expectEqual(filled.data[2], 0);
  testing.expectEqual(filled.data[3], 255);
}
</script>

<script id="CanvasRenderingContext2D#strokeRect">
{
  const element = document.createElement("canvas");
  element.width = 8;
  element.height = 8;
  const ctx = element.getContext("2d");

  ctx.strokeStyle = "#0000ff";
  ctx.strokeRect(1, 1, 4, 4);

  const border = ctx.getImageData(1, 1, 1, 1);
  const inner = ctx.getImageData(2, 2, 1, 1);
  testing.expectEqual(border.data[0], 0);
  testing.expectEqual(border.data[1], 0);
  testing.expectEqual(border.data[2], 255);
  testing.expectEqual(border.data[3], 255);
  testing.expectEqual(inner.data[3], 0);
}
</script>

<script id="CanvasRenderingContext2D#putImageData writes pixels">
{
  const element = document.createElement("canvas");
  element.width = 8;
  element.height = 8;
  const ctx = element.getContext("2d");

  const imageData = ctx.createImageData(2, 1);
  imageData.data[0] = 10;
  imageData.data[1] = 20;
  imageData.data[2] = 30;
  imageData.data[3] = 255;
  imageData.data[4] = 40;
  imageData.data[5] = 50;
  imageData.data[6] = 60;
  imageData.data[7] = 255;
  ctx.putImageData(imageData, 3, 4);

  const sample = ctx.getImageData(3, 4, 2, 1);
  testing.expectEqual(sample.data[0], 10);
  testing.expectEqual(sample.data[1], 20);
  testing.expectEqual(sample.data[2], 30);
  testing.expectEqual(sample.data[4], 40);
  testing.expectEqual(sample.data[5], 50);
  testing.expectEqual(sample.data[6], 60);
}
</script>

<script id="CanvasRenderingContext2D#width reset clears bitmap and keeps context identity">
{
  const element = document.createElement("canvas");
  const ctx = element.getContext("2d");

  ctx.fillStyle = "#ff0000";
  ctx.fillRect(0, 0, 4, 4);
  element.width = 64;

  const same = element.getContext("2d");
  const sample = same.getImageData(0, 0, 1, 1);
  testing.expectEqual(true, ctx === same);
  testing.expectEqual(0, sample.data[3]);
}
</script>

<script id="CanvasRenderingContext2D#drawImage(HTMLCanvasElement, dx, dy)">
{
  const source = document.createElement("canvas");
  source.width = 2;
  source.height = 1;
  const sourceCtx = source.getContext("2d");
  const image = sourceCtx.createImageData(2, 1);
  image.data[0] = 255;
  image.data[3] = 255;
  image.data[4] = 0;
  image.data[5] = 0;
  image.data[6] = 255;
  image.data[7] = 255;
  sourceCtx.putImageData(image, 0, 0);

  const target = document.createElement("canvas");
  target.width = 8;
  target.height = 8;
  const ctx = target.getContext("2d");
  ctx.drawImage(source, 3, 4);

  const sample = ctx.getImageData(3, 4, 2, 1);
  testing.expectEqual(255, sample.data[0]);
  testing.expectEqual(0, sample.data[1]);
  testing.expectEqual(0, sample.data[2]);
  testing.expectEqual(255, sample.data[3]);
  testing.expectEqual(0, sample.data[4]);
  testing.expectEqual(0, sample.data[5]);
  testing.expectEqual(255, sample.data[6]);
  testing.expectEqual(255, sample.data[7]);
}
</script>

<script id="CanvasRenderingContext2D#drawImage(HTMLCanvasElement, dx, dy, dWidth, dHeight)">
{
  const source = document.createElement("canvas");
  source.width = 2;
  source.height = 1;
  const sourceCtx = source.getContext("2d");
  const image = sourceCtx.createImageData(2, 1);
  image.data[0] = 255;
  image.data[3] = 255;
  image.data[4] = 0;
  image.data[5] = 0;
  image.data[6] = 255;
  image.data[7] = 255;
  sourceCtx.putImageData(image, 0, 0);

  const target = document.createElement("canvas");
  target.width = 8;
  target.height = 8;
  const ctx = target.getContext("2d");
  ctx.drawImage(source, 1, 2, 4, 2);

  const left = ctx.getImageData(1, 2, 1, 1).data;
  const right = ctx.getImageData(4, 2, 1, 1).data;
  testing.expectEqual(255, left[0]);
  testing.expectEqual(0, left[2]);
  testing.expectEqual(0, right[0]);
  testing.expectEqual(255, right[2]);
}
</script>

<script id="CanvasRenderingContext2D#drawImage(HTMLCanvasElement, sx, sy, sWidth, sHeight, dx, dy, dWidth, dHeight)">
{
  const source = document.createElement("canvas");
  source.width = 3;
  source.height = 1;
  const sourceCtx = source.getContext("2d");
  const image = sourceCtx.createImageData(3, 1);
  image.data[0] = 255;
  image.data[3] = 255;
  image.data[4] = 0;
  image.data[5] = 255;
  image.data[7] = 255;
  image.data[8] = 0;
  image.data[10] = 255;
  image.data[11] = 255;
  sourceCtx.putImageData(image, 0, 0);

  const target = document.createElement("canvas");
  target.width = 8;
  target.height = 8;
  const ctx = target.getContext("2d");
  ctx.drawImage(source, 1, 0, 1, 1, 0, 0, 2, 2);

  const sample = ctx.getImageData(1, 1, 1, 1).data;
  testing.expectEqual(0, sample[0]);
  testing.expectEqual(255, sample[1]);
  testing.expectEqual(0, sample[2]);
  testing.expectEqual(255, sample[3]);
}
</script>


<script id="getter">
{
  const element = document.createElement("canvas");
  const ctx = element.getContext("2d");
  testing.expectEqual('10px sans-serif', ctx.font);
  ctx.font = 'bold 48px serif'
  testing.expectEqual('bold 48px serif', ctx.font);

}
</script>
