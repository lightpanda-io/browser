<!DOCTYPE html>
<script src="testing.js"></script>

<script>
  function openDb(name, version, onUpgrade) {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(name, version);
      request.onupgradeneeded = (event) => {
        try {
          if (onUpgrade) {
            onUpgrade(request.result, event);
          }
        } catch (err) {
          reject(err);
        }
      };
      request.onerror = () => reject(new Error(request.error || 'open failed'));
      request.onsuccess = () => resolve(request.result);
    });
  }

  function requestResult(request) {
    return new Promise((resolve, reject) => {
      request.onerror = () => reject(new Error(request.error || 'request failed'));
      request.onsuccess = () => resolve(request.result);
    });
  }

  function iterateCursor(request, step) {
    return new Promise((resolve, reject) => {
      const values = [];
      request.onerror = () => reject(new Error(request.error || 'cursor failed'));
      request.onsuccess = () => {
        const cursor = request.result;
        if (!cursor) {
          resolve(values);
          return;
        }
        values.push(step(cursor));
        cursor.continue();
      };
    });
  }
</script>

<script id="indexed_db_open_upgrade">
  testing.async(async () => {
    const db = await openDb('lp-basic', 1, (upgradeDb) => {
      upgradeDb.createObjectStore('items');
    });
    testing.expectEqual('lp-basic', db.name);
    testing.expectEqual(1, db.version);
    const reopened = await openDb('lp-basic', 1);
    testing.expectEqual('lp-basic', reopened.name);
    testing.expectEqual(1, reopened.version);
    reopened.close();
    db.close();
  });
</script>

<script id="indexed_db_put_get_delete_clear">
  testing.async(async () => {
    const db = await openDb('lp-ops', 1, (upgradeDb) => {
      upgradeDb.createObjectStore('items');
    });
    const tx = db.transaction('items');
    const store = tx.objectStore('items');

    testing.expectEqual('items', store.name);
    testing.expectEqual('alpha', await requestResult(store.put({ hello: 'world', n: 7 }, 'alpha')));

    const alpha = await requestResult(store.get('alpha'));
    testing.expectEqual('world', alpha.hello);
    testing.expectEqual(7, alpha.n);

    await requestResult(store.delete('alpha'));
    testing.expectEqual(null, await requestResult(store.get('alpha')));

    await requestResult(store.put({ value: 'one' }, 'one'));
    await requestResult(store.put({ value: 'two' }, 'two'));
    await requestResult(store.clear());
    testing.expectEqual(null, await requestResult(store.get('one')));
    testing.expectEqual(null, await requestResult(store.get('two')));

    db.close();
  });
</script>

<script id="indexed_db_version_upgrade">
  testing.async(async () => {
    const db1 = await openDb('lp-upgrade', 1, (upgradeDb) => {
      upgradeDb.createObjectStore('one');
    });
    const tx1 = db1.transaction('one');
    const store1 = tx1.objectStore('one');
    await requestResult(store1.put({ ok: true }, 'persisted'));
    db1.close();

    const db2 = await openDb('lp-upgrade', 2, (upgradeDb) => {
      upgradeDb.createObjectStore('two');
    });
    testing.expectEqual(2, db2.version);

    const txOld = db2.transaction('one');
    const oldStore = txOld.objectStore('one');
    testing.expectEqual(true, (await requestResult(oldStore.get('persisted'))).ok);

    const tx2 = db2.transaction('two');
    const store2 = tx2.objectStore('two');
    await requestResult(store2.put({ n: 2 }, 'two'));
    testing.expectEqual(2, (await requestResult(store2.get('two'))).n);

    db2.close();
  });
</script>

<script id="indexed_db_index_lookup_persisted">
  testing.async(async () => {
    const db1 = await openDb('lp-index', 1, (upgradeDb) => {
      const store = upgradeDb.createObjectStore('users');
      store.createIndex('by_email', 'email');
    });

    const tx1 = db1.transaction('users');
    const store1 = tx1.objectStore('users');
    await requestResult(store1.put({ name: 'Ada', email: 'ada@example.com' }, 'user-1'));
    const index1 = store1.index('by_email');
    testing.expectEqual('by_email', index1.name);
    testing.expectEqual('email', index1.keyPath);
    testing.expectEqual('Ada', (await requestResult(index1.get('ada@example.com'))).name);
    db1.close();

    const db2 = await openDb('lp-index', 1);
    const tx2 = db2.transaction('users');
    const store2 = tx2.objectStore('users');
    const index2 = store2.index('by_email');
    testing.expectEqual('Ada', (await requestResult(index2.get('ada@example.com'))).name);

    await requestResult(store2.put({ name: 'Ada Lovelace', email: 'ada@new.example.com' }, 'user-1'));
    testing.expectEqual(null, await requestResult(index2.get('ada@example.com')));
    testing.expectEqual('Ada Lovelace', (await requestResult(index2.get('ada@new.example.com'))).name);

    await requestResult(store2.delete('user-1'));
    testing.expectEqual(null, await requestResult(index2.get('ada@new.example.com')));
    db2.close();
  });
</script>

<script id="indexed_db_cursor_iteration">
  testing.async(async () => {
    const db = await openDb('lp-cursor', 1, (upgradeDb) => {
      const store = upgradeDb.createObjectStore('users');
      store.createIndex('by_email', 'email');
    });

    const tx = db.transaction('users');
    const store = tx.objectStore('users');
    await requestResult(store.put({ name: 'Grace', email: 'grace@example.com' }, 'user-2'));
    await requestResult(store.put({ name: 'Ada', email: 'ada@example.com' }, 'user-1'));
    await requestResult(store.put({ name: 'Linus', email: 'linus@example.com' }, 'user-3'));

    const storeRows = await iterateCursor(store.openCursor(), (cursor) => {
      return `${cursor.primaryKey}:${cursor.value.name}`;
    });
    testing.expectEqual(['user-1:Ada', 'user-2:Grace', 'user-3:Linus'], storeRows);

    const emailRows = await iterateCursor(store.index('by_email').openCursor(), (cursor) => {
      return `${cursor.key}:${cursor.primaryKey}:${cursor.value.name}`;
    });
    testing.expectEqual([
      'ada@example.com:user-1:Ada',
      'grace@example.com:user-2:Grace',
      'linus@example.com:user-3:Linus',
    ], emailRows);

    db.close();
  });
</script>
