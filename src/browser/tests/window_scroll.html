<!DOCTYPE html>
<script src="testing.js"></script>

<script id=scrollBy_exists>
  testing.expectEqual('function', typeof window.scrollBy);
</script>

<script id=scrollBy_xy>
  window.scrollTo(0, 0);
  testing.expectEqual(0, window.scrollX);
  testing.expectEqual(0, window.scrollY);
  window.scrollBy(100, 200);
  testing.expectEqual(100, window.scrollX);
  testing.expectEqual(200, window.scrollY);
</script>

<script id=scrollBy_relative>
  window.scrollTo(100, 100);
  window.scrollBy(50, 50);
  testing.expectEqual(150, window.scrollX);
  testing.expectEqual(150, window.scrollY);
</script>

<script id=scrollBy_opts>
  window.scrollTo(0, 0);
  window.scrollBy({ left: 30, top: 40 });
  testing.expectEqual(30, window.scrollX);
  testing.expectEqual(40, window.scrollY);
</script>

<script id=scrollBy_negative_clamp>
  window.scrollTo(10, 10);
  window.scrollBy(-100, -100);
  testing.expectEqual(0, window.scrollX);
  testing.expectEqual(0, window.scrollY);
</script>

<script id=element_scroll_events_coalesce_and_preserve_reentrancy type=module>
  const state = await testing.async();
  const element = document.createElement('div');
  let scrolls = 0;
  let scrollends = 0;

  element.addEventListener('scroll', () => {
    scrolls++;
    if (scrolls === 1) {
      element.scrollTop = 101;
    }
  });
  element.addEventListener('scrollend', () => {
    scrollends++;
    if (scrollends === 1) {
      element.scrollTop = 102;
    }
  });

  for (let i = 1; i <= 100; i++) {
    element.scrollTop = i;
  }
  await new Promise(resolve => setTimeout(resolve, 100));

  state.resolve();
  await state.done(() => {
    testing.expectEqual(3, scrolls);
    testing.expectEqual(2, scrollends);
  });
</script>

<script id=element_scrollBy_noop_does_not_fire_events type=module>
  const state = await testing.async();
  const element = document.createElement('div');
  let scrolls = 0;
  let scrollends = 0;

  element.addEventListener('scroll', () => scrolls++);
  element.addEventListener('scrollend', () => scrollends++);
  element.scrollBy(-1, -1);
  await new Promise(resolve => setTimeout(resolve, 50));

  state.resolve();
  await state.done(() => {
    testing.expectEqual(0, scrolls);
    testing.expectEqual(0, scrollends);
  });
</script>
