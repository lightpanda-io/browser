<!DOCTYPE html>
<html>
<body>
    <div id="existing">Already here</div>
    <script>
        setTimeout(function() {
            var el = document.createElement("div");
            el.id = "delayed";
            el.textContent = "Appeared after delay";
            document.body.appendChild(el);
        }, 20);
    </script>
</body>
</html>
