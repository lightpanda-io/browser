<!DOCTYPE html>
<script src="../testing.js"></script>

<script id=default>
  let event = new KeyboardEvent("test", { key: "a" });
  testing.expectEqual(true, event instanceof KeyboardEvent);
  testing.expectEqual(true, event instanceof Event);

  testing.expectEqual("test", event.type);
  testing.expectEqual("a", event.key);

  testing.expectEqual(0, event.location);
  testing.expectEqual(false, event.repeat);
  testing.expectEqual(false, event.isComposing);

  testing.expectEqual(false, event.ctrlKey);
  testing.expectEqual(false, event.shiftKey);
  testing.expectEqual(false, event.metaKey);
  testing.expectEqual(false, event.altKey);
</script>

<script id=getModifierState>
  event = new KeyboardEvent("test", {
    altKey: true,
    shiftKey: true,
    metaKey: true,
    ctrlKey: true,
  });

  testing.expectEqual(true, event.getModifierState("Alt"));
  testing.expectEqual(true, event.getModifierState("AltGraph"));
  testing.expectEqual(true, event.getModifierState("Control"));
  testing.expectEqual(true, event.getModifierState("Shift"));
  testing.expectEqual(true, event.getModifierState("Meta"));
  testing.expectEqual(true, event.getModifierState("Accel"));
</script>

<script id=keyDownListener>
  event = new KeyboardEvent("keydown", { key: "z" });
  let isKeyDown = false;

  document.addEventListener("keydown", (e) => {
    isKeyDown = true;

    testing.expectEqual(true, e instanceof KeyboardEvent);
    testing.expectEqual(true, e instanceof UIEvent);
    testing.expectEqual(true, e instanceof Event);
    testing.expectEqual("z", event.key);
  });

  document.dispatchEvent(event);

  testing.expectEqual(true, isKeyDown);
</script>

<script id=isTrusted>
  // Test isTrusted on KeyboardEvent
  let keyEvent = new KeyboardEvent('keydown', {key: 'a'});
  testing.expectEqual(false, keyEvent.isTrusted);

  // Test isTrusted on dispatched KeyboardEvent
  let keyIsTrusted = null;
  document.addEventListener('keytest', (e) => {
    keyIsTrusted = e.isTrusted;
    testing.expectEqual(true, e instanceof KeyboardEvent);
  });
  document.dispatchEvent(new KeyboardEvent('keytest', {key: 'b'}));
  testing.expectEqual(false, keyIsTrusted);
</script>

<script id=non_keyboard_keydown>
  // this used to crash
  {
    let called = false;
    const div = document.createElement('div')
    div.addEventListener('keydown', () => {
      called = true;
    });
    div.dispatchEvent(new Event('keydown'));
    testing.expectEqual(true, called);
  }
</script>

<script id=domKeyLocationConstants>
  {
    testing.expectEqual(0, KeyboardEvent.DOM_KEY_LOCATION_STANDARD);
    testing.expectEqual(1, KeyboardEvent.DOM_KEY_LOCATION_LEFT);
    testing.expectEqual(2, KeyboardEvent.DOM_KEY_LOCATION_RIGHT);
    testing.expectEqual(3, KeyboardEvent.DOM_KEY_LOCATION_NUMPAD);

    let evt = new KeyboardEvent('keydown', {key: 'a'});
    testing.expectEqual(0, evt.DOM_KEY_LOCATION_STANDARD);
    testing.expectEqual(1, evt.DOM_KEY_LOCATION_LEFT);
    testing.expectEqual(2, evt.DOM_KEY_LOCATION_RIGHT);
    testing.expectEqual(3, evt.DOM_KEY_LOCATION_NUMPAD);
  }
</script>

<script id=keyCodeAndCharCodeAreZeroForSyntheticEvents>
  {
    // Per Chrome behavior, both legacy `keyCode` and `charCode` return 0 for
    // events constructed via `new KeyboardEvent(...)` because such events
    // have `isTrusted === false`. The legacy mapping (a -> 65, Enter -> 13,
    // etc.) is only exposed for events dispatched by the user agent itself.
    // The full mapping table is exercised via Zig unit tests in
    // `webapi/event/KeyboardEvent.zig`.

    // Letters
    testing.expectEqual(0, new KeyboardEvent('keydown', {key: 'a'}).keyCode);
    testing.expectEqual(0, new KeyboardEvent('keydown', {key: 'Z'}).keyCode);
    // Digits
    testing.expectEqual(0, new KeyboardEvent('keydown', {key: '5'}).keyCode);
    // Space
    testing.expectEqual(0, new KeyboardEvent('keydown', {key: ' '}).keyCode);
    // Named keys
    testing.expectEqual(0, new KeyboardEvent('keydown', {key: 'Enter'}).keyCode);
    testing.expectEqual(0, new KeyboardEvent('keydown', {key: 'F1'}).keyCode);
    // Unknown key
    testing.expectEqual(0, new KeyboardEvent('keydown', {key: 'Dead'}).keyCode);

    // charCode follows the same rule across event types.
    testing.expectEqual(0, new KeyboardEvent('keypress', {key: 'a'}).charCode);
    testing.expectEqual(0, new KeyboardEvent('keypress', {key: 'Enter'}).charCode);
    testing.expectEqual(0, new KeyboardEvent('keydown', {key: 'a'}).charCode);
    testing.expectEqual(0, new KeyboardEvent('keyup', {key: 'a'}).charCode);
  }
</script>

<script id=initKeyboardEvent>
  {
    let evt = new KeyboardEvent('keydown', {key: 'a'});
    evt.initKeyboardEvent('keyup', true, true, window, 'q', 1, true, false, true, false);
    testing.expectEqual('keyup', evt.type);
    testing.expectEqual(true, evt.bubbles);
    testing.expectEqual(true, evt.cancelable);
    testing.expectEqual('q', evt.key);
    testing.expectEqual(1, evt.location);
    testing.expectEqual(true, evt.ctrlKey);
    testing.expectEqual(false, evt.altKey);
    testing.expectEqual(true, evt.shiftKey);
    testing.expectEqual(false, evt.metaKey);
  }
</script>

<script id=initKeyboardEventOptional>
  {
    let evt = new KeyboardEvent('keydown', {key: 'x'});
    evt.initKeyboardEvent('foo');
    testing.expectEqual('foo', evt.type);
    testing.expectEqual(false, evt.bubbles);
    testing.expectEqual(false, evt.cancelable);
    testing.expectEqual('', evt.key);
    testing.expectEqual(0, evt.location);
  }
</script>
