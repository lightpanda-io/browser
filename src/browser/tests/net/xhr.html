<!DOCTYPE html>
<script src="../testing.js"></script>

<script id=xhr type=module>
  testing.expectEqual(0, XMLHttpRequest.UNSENT);
  testing.expectEqual(1, XMLHttpRequest.OPENED);
  testing.expectEqual(2, XMLHttpRequest.HEADERS_RECEIVED);
  testing.expectEqual(3, XMLHttpRequest.LOADING);
  testing.expectEqual(4, XMLHttpRequest.DONE);
  {
    const state = await testing.async();
    const req = new XMLHttpRequest();

    function cbk(event) {
      state.resolve(event)
    }

    req.onload = cbk;
    testing.expectEqual(cbk, req.onload);
    req.onload = cbk;

    req.open('GET', 'http://127.0.0.1:9582/xhr');
    testing.expectEqual(0, req.status);
    testing.expectEqual('', req.statusText);
    testing.expectEqual('', req.getAllResponseHeaders());
    testing.expectEqual(null, req.getResponseHeader('Content-Type'));
    testing.expectEqual('', req.responseText);
    testing.expectEqual('', req.responseURL);
    req.send();


    await state.done((event) => {
      testing.expectEqual('load', event.type);
      testing.expectEqual(true, event.loaded > 0);
      testing.expectEqual(true, event instanceof ProgressEvent);
      testing.expectEqual(200, req.status);
      testing.expectEqual('OK', req.statusText);
      testing.expectEqual('text/html; charset=utf-8', req.getResponseHeader('Content-Type'));
      testing.expectEqual('content-length: 100\r\nContent-Type: text/html; charset=utf-8\r\n', req.getAllResponseHeaders());
      testing.expectEqual(100, req.responseText.length);
      testing.expectEqual(req.responseText.length, req.response.length);
      testing.expectEqual('http://127.0.0.1:9582/xhr', req.responseURL);
    });
  }
</script>

<script id=xhr5 type=module>
  {
    const state = await testing.async();
    let records = [];
    const req5 = new XMLHttpRequest();
    req5.onreadystatechange = (e) => {
      records.push(req5.readyState);
      if (req5.readyState === XMLHttpRequest.DONE) {
        state.resolve({records: records, target: e.currentTarget});
      }
    }
    req5.open('GET', 'http://127.0.0.1:9582/xhr');
    req5.send();

    await state.done((result) => {
      const {records: records, target: target} = result;
      testing.expectEqual(4, records.length)
      testing.expectEqual(XMLHttpRequest.OPENED, records[0]);
      testing.expectEqual(XMLHttpRequest.HEADERS_RECEIVED, records[1]);
      testing.expectEqual(XMLHttpRequest.LOADING, records[2]);
      testing.expectEqual(XMLHttpRequest.DONE, records[3]);
      testing.expectEqual(req5, target);
    });
  }
</script>

<script id=xhr_abort type=module>
  {
    const state = await testing.async();
    const req = new XMLHttpRequest();
    let abortFired = false;
    let errorFired = false;
    let loadEndFired = false;

    req.onabort = () => { abortFired = true; };
    req.onerror = () => { errorFired = true; };
    req.onloadend = () => {
      loadEndFired = true;
      state.resolve();
    };

    req.open('GET', 'http://127.0.0.1:9582/xhr');
    req.send();
    req.abort();

    await state.done(() => {
      testing.expectEqual(true, abortFired);
      testing.expectEqual(true, errorFired);
      testing.expectEqual(true, loadEndFired);
      testing.expectEqual(XMLHttpRequest.UNSENT, req.readyState);
    });
  }
</script>

<script id=xhr_blob_url type=module>
  {
    const state = await testing.async();

    // Create a blob and get its URL
    const blob = new Blob(['Hello from blob!'], { type: 'text/plain' });
    const blobUrl = URL.createObjectURL(blob);

    const req = new XMLHttpRequest();
    req.onload = () => { state.resolve() };
    req.open('GET', blobUrl);
    req.send();

    await state.done(() => {
      testing.expectEqual(200, req.status);
      testing.expectEqual('Hello from blob!', req.responseText);
      testing.expectEqual(blobUrl, req.responseURL);

      // Clean up
      URL.revokeObjectURL(blobUrl);
    });
  }
</script>

<script id=xhr_override_mime type=module>
  {
    // overrideMimeType is callable in state UNSENT (no open() yet)
    const req = new XMLHttpRequest();
    testing.expectEqual(0, req.readyState);
    req.overrideMimeType('text/xml');
  }

  {
    // overrideMimeType is callable in state OPENED
    const req = new XMLHttpRequest();
    req.open('GET', 'http://127.0.0.1:9582/xhr');
    testing.expectEqual(1, req.readyState);
    req.overrideMimeType('text/xml; charset=utf-8');
  }

  {
    // Invalid mime values must NOT throw; they fall back to
    // application/octet-stream per spec.
    const req = new XMLHttpRequest();
    req.overrideMimeType('!!!');
    req.overrideMimeType('');
    req.overrideMimeType('not a mime');
  }

</script>

<script id=xhr_override_mime_done type=module>
  {
    // After send() reaches DONE, overrideMimeType throws InvalidStateError.
    const state = await testing.async();
    const req = new XMLHttpRequest();
    req.onload = () => state.resolve();
    req.open('GET', 'http://127.0.0.1:9582/xhr');
    req.send();
    await state.done(() => {
      testing.expectEqual(4, req.readyState);
      testing.withError((err) => {
        testing.expectEqual('InvalidStateError', err.name);
      }, () => {
        req.overrideMimeType('text/xml');
      });
    });
  }
</script>

<script id=xhr_override_mime_survives_open type=module>
  {
    // Override survives open() (spec: open() resets state but keeps the
    // override MIME type). Re-opening then sending must not throw on the
    // prior override.
    const state = await testing.async();
    const req = new XMLHttpRequest();
    req.overrideMimeType('text/xml');
    req.open('GET', 'http://127.0.0.1:9582/xhr');
    req.open('GET', 'http://127.0.0.1:9582/xhr');
    req.onload = () => state.resolve();
    req.send();
    await state.done(() => {
      testing.expectEqual(200, req.status);
    });
  }
</script>

<script id=xhr_override_mime_responsexml type=module>
  {
    // End-to-end: server returns text/html, but overrideMimeType("text/xml")
    // makes responseXML lazily parse the body as a Document, while
    // responseText is unaffected (responseType is still the default "").
    const state = await testing.async();
    const req = new XMLHttpRequest();
    req.overrideMimeType('text/xml');
    req.open('GET', 'http://127.0.0.1:9582/xhr');
    req.onload = () => state.resolve();
    req.send();
    await state.done(() => {
      testing.expectEqual(200, req.status);
      testing.expectEqual(100, req.responseText.length);
      testing.expectEqual(true, req.responseXML instanceof Document);
      // Cached across calls.
      testing.expectEqual(req.responseXML, req.responseXML);
    });
  }
</script>

<script id=xhr_timeout type=module>
  {
    // timeout property: default is 0
    const req = new XMLHttpRequest();
    testing.expectEqual(0, req.timeout);

    // timeout can be set and read back
    req.timeout = 5000;
    testing.expectEqual(5000, req.timeout);

    // request with timeout set succeeds normally when server responds in time
    const state = await testing.async();
    req.onload = (e) => { state.resolve(e) };
    req.open('GET', 'http://127.0.0.1:9582/xhr');
    req.send();

    await state.done((event) => {
      testing.expectEqual('load', event.type);
      testing.expectEqual(200, req.status);
      testing.expectEqual(5000, req.timeout);
    });
  }
</script>

<script id=xhr_reuse type=module>
  {
    // Reusing the same XHR object from its own onload handler (open()+send()
    // again) must not leak: send() acquires a self-ref and each request's
    // terminal callback releases one. The second send() starts while the
    // first request's release is still pending (it runs after this load
    // dispatch), so both refs are briefly live. A regression here is caught
    // by the test runner's ArenaPool leak check at teardown.
    const state = await testing.async();

    const req = new XMLHttpRequest();
    let loads = 0;
    req.onload = () => {
      loads += 1;
      if (loads === 1) {
        // reuse the same object for a second request
        req.open('GET', 'http://127.0.0.1:9582/xhr');
        req.send();
      } else {
        state.resolve();
      }
    };
    req.open('GET', 'http://127.0.0.1:9582/xhr');
    req.send();

    await state.done(() => {
      testing.expectEqual(2, loads);
      testing.expectEqual(200, req.status);
    });
  }
</script>

<script id=xhr_upload type=module>
  {
    // upload is an XMLHttpRequestUpload (an XMLHttpRequestEventTarget) and
    // exposes addEventListener; htmx relies on this not throwing.
    const req = new XMLHttpRequest();
    testing.expectEqual('XMLHttpRequestUpload', req.upload.constructor.name);
    testing.expectEqual(true, req.upload instanceof XMLHttpRequestEventTarget);
    testing.expectEqual(true, req.upload instanceof EventTarget);
    testing.expectEqual('function', typeof req.upload.addEventListener);

    // The same instance is returned on every access so listeners stick.
    testing.expectEqual(req.upload, req.upload);

    let registered = false;
    req.upload.addEventListener('progress', () => { registered = true; });
    testing.expectEqual(false, registered);
  }
</script>

<script id=xhr_send_flag type=module>
  {
    // Per spec, calling send() while a request is already in flight throws
    // InvalidStateError (the "send() flag"). Without it, two concurrent
    // transfers race on the XHR's single response slot and one is left dangling
    // at teardown (the "release overflow" UAF).
    const state = await testing.async();
    const req = new XMLHttpRequest();
    req.onload = () => state.resolve();
    req.open('GET', 'http://127.0.0.1:9582/xhr');
    req.send();
    testing.expectError('InvalidStateError', () => req.send());

    await state.done(() => {
      // the first request was unaffected by the rejected second send()
      testing.expectEqual(200, req.status);
    });

    // a fresh open() clears the flag, so the object is reusable
    const state2 = await testing.async();
    req.onload = () => state2.resolve();
    req.open('GET', 'http://127.0.0.1:9582/xhr');
    req.send();
    await state2.done(() => testing.expectEqual(200, req.status));
  }
</script>
