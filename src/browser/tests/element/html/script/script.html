<!DOCTYPE html>
<script src="../../../testing.js"></script>

<script id="script">
{
   let dom_load = false;
   let attribute_load = false;

   let s = document.createElement('script');
   document.documentElement.addEventListener('load', (e) => {
      testing.expectEqual(s, e.target);
      dom_load = true;
   }, true);

   testing.expectEqual('', s.src);
   s.onload = function(e) {
      testing.expectEqual(s, e.target);
      attribute_load = true;
   }
   s.src = 'empty.js';
   testing.expectEqual(testing.BASE_URL + 'element/html/script/empty.js', s.src);
   document.head.appendChild(s);

   testing.onload(() => {
      testing.expectEqual(true, dom_load);
      testing.expectEqual(true, attribute_load);
   });

   // Web IDL requires attribute getters/setters to be named "get X" / "set X"
   // and methods to use their identifier. Sentinel for the binding-level naming
   // fix in Snapshot.zig — Script.src exercises both accessor paths.
   const desc = Object.getOwnPropertyDescriptor(HTMLScriptElement.prototype, 'src');
   testing.expectEqual('get src', desc.get.name);
   testing.expectEqual('set src', desc.set.name);

   const append = Object.getOwnPropertyDescriptor(Element.prototype, 'append');
   testing.expectEqual('append', append.value.name);

   // Constructor.length should equal the number of required arguments (1 for
   // events: the type). Sentinel for the New__Config wiring in Snapshot.zig.
   testing.expectEqual(1, MouseEvent.length);
   testing.expectEqual(1, KeyboardEvent.length);
   testing.expectEqual(1, Event.length);
}
</script>
