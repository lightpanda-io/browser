<!DOCTYPE html>
<script src="../../testing.js"></script>

<svg id=test-svg>
  <rect id=test-r x="10" y="20" width="100" height="50"/>
  <circle id=test-c cx="50" cy="50" r="25"/>
  <ellipse id=test-e cx="50" cy="50" rx="30" ry="20"/>
  <line id=test-l x1="0" y1="0" x2="100" y2="100"/>
  <path id=test-p d="M10,20 L30,40"/>
  <g id=test-g><rect width="10" height="10"/></g>
  <text id=test-t>Hello</text>
</svg>

<script id=instanceof_checks>
{
  testing.expectEqual('SVGSVGElement', document.getElementById('test-svg').constructor.name);
  testing.expectEqual('SVGRectElement', document.getElementById('test-r').constructor.name);
  testing.expectEqual('SVGCircleElement', document.getElementById('test-c').constructor.name);
  testing.expectEqual('SVGEllipseElement', document.getElementById('test-e').constructor.name);
  testing.expectEqual('SVGLineElement', document.getElementById('test-l').constructor.name);
  testing.expectEqual('SVGPathElement', document.getElementById('test-p').constructor.name);
  testing.expectEqual('SVGGElement', document.getElementById('test-g').constructor.name);
  testing.expectEqual('SVGTextElement', document.getElementById('test-t').constructor.name);
}
</script>

<script id=createElementNS>
{
  var ns = 'http://www.w3.org/2000/svg';
  testing.expectEqual('SVGRectElement', document.createElementNS(ns, 'rect').constructor.name);
  testing.expectEqual('SVGCircleElement', document.createElementNS(ns, 'circle').constructor.name);
  testing.expectEqual('SVGPathElement', document.createElementNS(ns, 'path').constructor.name);
  testing.expectEqual('SVGGElement', document.createElementNS(ns, 'g').constructor.name);
  testing.expectEqual('SVGTextElement', document.createElementNS(ns, 'text').constructor.name);
  testing.expectEqual('SVGAElement', document.createElementNS(ns, 'a').constructor.name);
  testing.expectEqual('SVGUnknownElement', document.createElementNS(ns, 'foobar').constructor.name);
  testing.expectEqual('http://www.w3.org/2000/svg', document.createElementNS(ns, 'rect').namespaceURI);
}
</script>
