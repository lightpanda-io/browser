<!DOCTYPE html>
<script src="../testing.js"></script>

<div id="test1">Test Element</div>
<div id="test2">Another Element</div>

<script id="clientDimensions">
{
  const test1 = $('#test1');

  // clientWidth/Height - default is 5px in dummy layout
  testing.expectEqual('number', typeof test1.clientWidth);
  testing.expectEqual('number', typeof test1.clientHeight);
  testing.expectTrue(test1.clientWidth >= 0);
  testing.expectTrue(test1.clientHeight >= 0);

  // clientTop/Left should be 0 (no borders in dummy layout)
  testing.expectEqual(0, test1.clientTop);
  testing.expectEqual(0, test1.clientLeft);
}
</script>

<script id="scrollDimensions">
{
  const test1 = $('#test1');

  // Both scroll dimensions are approximated from the content, so neither falls
  // below the element's own box but either may exceed it.
  testing.expectTrue(test1.scrollWidth >= test1.clientWidth);
  testing.expectTrue(test1.scrollHeight >= test1.clientHeight);

  // test1 holds only a text node, and text is not measured on either axis, so
  // both still match the element's own box.
  testing.expectEqual(test1.clientWidth, test1.scrollWidth);
  testing.expectEqual(test1.clientHeight, test1.scrollHeight);
}
</script>

<script id="scrollWidthFromContent">
{
  // An empty element has no content to overflow its box.
  const empty = document.createElement('div');
  document.body.appendChild(empty);
  testing.expectEqual(empty.clientWidth, empty.scrollWidth);

  // Each added child strictly increases scrollWidth, and enough of them push
  // it past the element's own box.
  const box = document.createElement('div');
  document.body.appendChild(box);
  box.appendChild(document.createElement('span'));
  const oneChild = box.scrollWidth;
  testing.expectTrue(oneChild >= box.clientWidth);

  box.appendChild(document.createElement('span'));
  testing.expectTrue(box.scrollWidth > oneChild);
  testing.expectTrue(box.scrollWidth > box.clientWidth);

  // Text contributes nothing, however long. Estimating a run from its length
  // would need a per-character advance that tracks font-size, and would report
  // overflow for practically every element containing text.
  const short = document.createElement('div');
  const long = document.createElement('div');
  short.textContent = 'ab';
  long.textContent = 'abcdefghijklmnop';
  document.body.appendChild(short);
  document.body.appendChild(long);
  testing.expectEqual(short.clientWidth, short.scrollWidth);
  testing.expectEqual(long.clientWidth, long.scrollWidth);
  testing.expectEqual(short.scrollWidth, long.scrollWidth);

  // Comments are not rendered, so they contribute nothing.
  const commented = document.createElement('div');
  commented.innerHTML = '<!-- a very long comment that renders as nothing -->';
  document.body.appendChild(commented);
  testing.expectEqual(commented.clientWidth, commented.scrollWidth);

  // A display:none child takes up no space.
  const withHidden = document.createElement('div');
  const hiddenChild = document.createElement('span');
  hiddenChild.style.display = 'none';
  withHidden.appendChild(hiddenChild);
  document.body.appendChild(withHidden);
  testing.expectEqual(withHidden.clientWidth, withHidden.scrollWidth);

  // A hidden element reports 0, matching clientWidth/offsetWidth.
  const hidden = document.createElement('div');
  hidden.style.display = 'none';
  hidden.appendChild(document.createElement('span'));
  document.body.appendChild(hidden);
  testing.expectEqual(0, hidden.scrollWidth);

  // The root containers keep their synthetic size rather than summing
  // children, so horizontal page-overflow checks stay stable.
  testing.expectEqual(document.body.clientWidth, document.body.scrollWidth);
  testing.expectEqual(
    document.documentElement.clientWidth,
    document.documentElement.scrollWidth,
  );
}
</script>

<script id="scrollWidthMarqueeLoop">
{
  // Regression: the infinite-marquee idiom duplicates content until it is
  // twice the width of its container. scrollWidth has to respond to the
  // insertion or the loop never terminates.
  const track = document.createElement('div');
  const lane = document.createElement('div');
  lane.innerHTML = '<span>item</span>';
  track.appendChild(lane);
  document.body.appendChild(track);

  // Doubling the markup doubles the measured content width.
  const before = lane.scrollWidth;
  lane.innerHTML += lane.innerHTML;
  testing.expectEqual(before * 2, lane.scrollWidth);

  let guard = 0;
  while (lane.scrollWidth < track.offsetWidth * 2 && guard < 50) {
    lane.innerHTML += lane.innerHTML;
    guard++;
  }
  testing.expectTrue(guard < 50);
}
</script>

<script id="scrollHeightFromContent">
{
  // An empty element has no content to overflow its box.
  const empty = document.createElement('div');
  document.body.appendChild(empty);
  testing.expectEqual(empty.clientHeight, empty.scrollHeight);

  // Children stack, so each one strictly increases scrollHeight.
  const box = document.createElement('div');
  document.body.appendChild(box);
  box.appendChild(document.createElement('div'));
  const oneChild = box.scrollHeight;
  testing.expectTrue(oneChild >= box.clientHeight);

  box.appendChild(document.createElement('div'));
  testing.expectTrue(box.scrollHeight > oneChild);
  testing.expectTrue(box.scrollHeight > box.clientHeight);

  // Text contributes no height, as it contributes no width: a text child's
  // line box is what the element's own size already stands in for.
  const short = document.createElement('div');
  const long = document.createElement('div');
  short.textContent = 'ab';
  long.textContent = 'abcdefghijklmnop';
  document.body.appendChild(short);
  document.body.appendChild(long);
  testing.expectEqual(short.clientHeight, short.scrollHeight);
  testing.expectEqual(long.clientHeight, long.scrollHeight);
  testing.expectEqual(short.scrollHeight, long.scrollHeight);

  // A display:none child takes up no space.
  const withHidden = document.createElement('div');
  const hiddenChild = document.createElement('div');
  hiddenChild.style.display = 'none';
  withHidden.appendChild(hiddenChild);
  document.body.appendChild(withHidden);
  testing.expectEqual(withHidden.clientHeight, withHidden.scrollHeight);

  // A hidden element reports 0, matching clientHeight/offsetHeight.
  const hidden = document.createElement('div');
  hidden.style.display = 'none';
  hidden.appendChild(document.createElement('div'));
  document.body.appendChild(hidden);
  testing.expectEqual(0, hidden.scrollHeight);

  // The root containers keep their synthetic size rather than summing
  // children. This is what keeps infinite-scroll triggers reading
  // `scrollTop + clientHeight >= scrollHeight` on body/documentElement
  // behaving as they do today.
  testing.expectEqual(document.body.clientHeight, document.body.scrollHeight);
  testing.expectEqual(
    document.documentElement.clientHeight,
    document.documentElement.scrollHeight,
  );
}
</script>

<script id="scrollHeightMarqueeLoop">
{
  // The vertical counterpart of scrollWidthMarqueeLoop: a ticker that grows
  // its lane until it is twice the height of its container.
  const track = document.createElement('div');
  const lane = document.createElement('div');
  lane.innerHTML = '<div>item</div>';
  track.appendChild(lane);
  document.body.appendChild(track);

  // Doubling the markup doubles the measured content height.
  const before = lane.scrollHeight;
  lane.innerHTML += lane.innerHTML;
  testing.expectEqual(before * 2, lane.scrollHeight);

  let guard = 0;
  while (lane.scrollHeight < track.offsetHeight * 2 && guard < 50) {
    lane.innerHTML += lane.innerHTML;
    guard++;
  }
  testing.expectTrue(guard < 50);
}
</script>
<script id="scrollPosition">
{
  const test1 = $('#test1');

  // Initial scroll position should be 0
  testing.expectEqual(0, test1.scrollTop);
  testing.expectEqual(0, test1.scrollLeft);

  // Setting scroll position
  test1.scrollTop = 50;
  testing.expectEqual(50, test1.scrollTop);

  test1.scrollLeft = 25;
  testing.expectEqual(25, test1.scrollLeft);

  // Negative values should be clamped to 0
  test1.scrollTop = -10;
  testing.expectEqual(0, test1.scrollTop);

  test1.scrollLeft = -5;
  testing.expectEqual(0, test1.scrollLeft);

  // Each element has independent scroll position
  const test2 = $('#test2');
  testing.expectEqual(0, test2.scrollTop);
  testing.expectEqual(0, test2.scrollLeft);

  test2.scrollTop = 100;
  testing.expectEqual(100, test2.scrollTop);
  testing.expectEqual(0, test1.scrollTop); // test1 should still be 0
}
</script>

<script id="scrollMethods">
{
  const test3 = $('#test2');
  test3.scrollTop = 0;
  test3.scrollLeft = 0;

  // scroll()/scrollTo() with (x, y) positional args
  test3.scrollTo(30, 40);
  testing.expectEqual(30, test3.scrollLeft);
  testing.expectEqual(40, test3.scrollTop);

  test3.scroll(5, 6);
  testing.expectEqual(5, test3.scrollLeft);
  testing.expectEqual(6, test3.scrollTop);

  // scrollTo() with an options dictionary; omitted axes are left unchanged
  test3.scrollTo({left: 11, top: 22});
  testing.expectEqual(11, test3.scrollLeft);
  testing.expectEqual(22, test3.scrollTop);

  test3.scrollTo({top: 99});
  testing.expectEqual(11, test3.scrollLeft); // unchanged
  testing.expectEqual(99, test3.scrollTop);

  // Negative values clamp to 0
  test3.scrollTo(-10, -10);
  testing.expectEqual(0, test3.scrollLeft);
  testing.expectEqual(0, test3.scrollTop);

  // scrollBy() is relative to the current position
  test3.scrollTo(10, 10);
  test3.scrollBy(5, 7);
  testing.expectEqual(15, test3.scrollLeft);
  testing.expectEqual(17, test3.scrollTop);

  test3.scrollBy({left: -3, top: -2});
  testing.expectEqual(12, test3.scrollLeft);
  testing.expectEqual(15, test3.scrollTop);

  // scrollBy() clamps to 0 and never goes negative
  test3.scrollBy(-1000, -1000);
  testing.expectEqual(0, test3.scrollLeft);
  testing.expectEqual(0, test3.scrollTop);
}
</script>

<script id="offsetDimensions">
{
  const test1 = $('#test1');

  // offsetWidth/Height should be numbers
  testing.expectEqual('number', typeof test1.offsetWidth);
  testing.expectEqual('number', typeof test1.offsetHeight);
  testing.expectTrue(test1.offsetWidth >= 0);
  testing.expectTrue(test1.offsetHeight >= 0);

  // Should equal client dimensions
  testing.expectEqual(test1.clientWidth, test1.offsetWidth);
  testing.expectEqual(test1.clientHeight, test1.offsetHeight);
}
</script>

<script id="offsetPosition">
{
  const test1 = $('#test1');
  const test2 = $('#test2');

  // offsetTop/Left should be calculated from tree position
  // These values are based on the heuristic layout engine
  const top1 = test1.offsetTop;
  const left1 = test1.offsetLeft;
  const top2 = test2.offsetTop;
  const left2 = test2.offsetLeft;

  // Position values should be numbers
  testing.expectEqual('number', typeof top1);
  testing.expectEqual('number', typeof left1);
  testing.expectEqual('number', typeof top2);
  testing.expectEqual('number', typeof left2);

  // Siblings should have different positions (either different x or y)
  testing.expectTrue(top1 !== top2 || left1 !== left2);
}
</script>

<script id="offsetVsBounding">
{
  const test1 = $('#test1');

  // offsetTop/Left should match getBoundingClientRect
  const rect = test1.getBoundingClientRect();
  testing.expectEqual(rect.y, test1.offsetTop);
  testing.expectEqual(rect.x, test1.offsetLeft);
  testing.expectEqual(rect.width, test1.offsetWidth);
  testing.expectEqual(rect.height, test1.offsetHeight);
}
</script>

<script id="offsetParent">
{
  const test1 = $('#test1');

  // Default offset ancestor is the body.
  testing.expectEqual(document.body, test1.offsetParent);

  // The root and body elements have no offsetParent.
  testing.expectEqual(null, document.documentElement.offsetParent);
  testing.expectEqual(null, document.body.offsetParent);

  // A positioned ancestor wins over the body.
  const wrap = document.createElement('div');
  wrap.style.position = 'relative';
  const inner = document.createElement('span');
  wrap.appendChild(inner);
  document.body.appendChild(wrap);
  testing.expectEqual(wrap, inner.offsetParent);

  // A position:fixed element has no offsetParent.
  inner.style.position = 'fixed';
  testing.expectEqual(null, inner.offsetParent);
  inner.style.position = '';

  // Static elements offset from table machinery: content → cell, cell → table.
  const table = document.createElement('table');
  const tr = document.createElement('tr');
  const td = document.createElement('td');
  const cellContent = document.createElement('span');
  td.appendChild(cellContent);
  tr.appendChild(td);
  table.appendChild(tr);
  document.body.appendChild(table);
  testing.expectEqual(td, cellContent.offsetParent);
  testing.expectEqual(table, td.offsetParent);

  // ...but a positioned element ignores the td/th/table rule.
  cellContent.style.position = 'absolute';
  testing.expectEqual(document.body, cellContent.offsetParent);

  // display:none (own or inherited) → null.
  const hidden = document.createElement('div');
  hidden.style.display = 'none';
  const hiddenChild = document.createElement('span');
  hidden.appendChild(hiddenChild);
  document.body.appendChild(hidden);
  testing.expectEqual(null, hidden.offsetParent);
  testing.expectEqual(null, hiddenChild.offsetParent);

  // Detached elements → null.
  testing.expectEqual(null, document.createElement('div').offsetParent);

  // Shadow-tree elements hop the boundary to the host's offset ancestor.
  const host = document.createElement('div');
  document.body.appendChild(host);
  const shadow = host.attachShadow({mode: 'open'});
  const shadowChild = document.createElement('div');
  shadow.appendChild(shadowChild);
  testing.expectEqual(document.body, shadowChild.offsetParent);

  // A positioned host is itself the offsetParent.
  host.style.position = 'relative';
  testing.expectEqual(host, shadowChild.offsetParent);
}
</script>

<script id="scrollIntoView">
{
  // Add an element deep in the document so its position is non-zero.
  const deep = document.createElement('div');
  deep.id = 'deep';
  document.body.appendChild(deep);

  const targetY = deep.getBoundingClientRect().y;
  testing.expectTrue(targetY > 0);

  // scrollIntoView() always brings the element's top to the scroll offset.
  window.scrollTo(0, 999999);
  deep.scrollIntoView();
  testing.expectEqual(targetY, window.scrollY);

  // scrollIntoViewIfNeeded() is a no-op when the element is already within the
  // viewport band [scrollY, scrollY + innerHeight]. Sit just below the
  // element's top so a stray scroll would visibly move scrollY.
  const inView = Math.max(0, targetY - 1);
  window.scrollTo(0, inView);
  deep.scrollIntoViewIfNeeded();
  testing.expectEqual(inView, window.scrollY);

  // ...but it does scroll when the element is outside the band.
  window.scrollTo(0, targetY + window.innerHeight + 100);
  deep.scrollIntoViewIfNeeded();
  testing.expectEqual(targetY, window.scrollY);
}
</script>
