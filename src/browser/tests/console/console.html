<!DOCTYPE html>
<script src="../testing.js"></script>

<script id="time">
    // should not crash
    console.time();
    console.timeLog();
    console.timeEnd();

    console.time("test");
    console.timeLog("test");
    console.timeEnd("test");

    testing.expectEqual(true, true);
</script>

<script id="count">
    // should not crash
    console.count();
    console.count();
    console.countReset();

    console.count("test");
    console.count("test");
    console.countReset("test");

    testing.expectEqual(true, true);
</script>

<script id="group">
    // should not crash
    console.group();
    console.groupEnd();

    console.group("outer");
    console.group("inner");
    console.log("nested");
    console.groupEnd();
    console.groupEnd();

    console.groupCollapsed("collapsed");
    console.log("inside collapsed");
    console.groupEnd();

    // groupEnd beyond depth 0 should not crash
    console.groupEnd();

    testing.expectEqual(true, true);
</script>
