name: wpt

env:
  AWS_ACCESS_KEY_ID: ${{ vars.LPD_PERF_AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.LPD_PERF_AWS_SECRET_ACCESS_KEY }}
  AWS_BUCKET: ${{ vars.LPD_PERF_AWS_BUCKET }}
  AWS_REGION: ${{ vars.LPD_PERF_AWS_REGION }}
  AWS_CF_DISTRIBUTION: ${{ vars.AWS_CF_DISTRIBUTION }}
  LIGHTPANDA_DISABLE_TELEMETRY: true

on:
  schedule:
    - cron: "21 2 * * *"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  wpt-build-release:
    name: zig build -Dwpt_extensions release

    env:
      ARCH: aarch64
      OS: linux

    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/install
        with:
          os: ${{env.OS}}
          arch: ${{env.ARCH}}

      - name: zig build release
        run: zig build -Dwpt_extensions -Dprebuilt_v8_path=v8/libc_v8.a -Doptimize=ReleaseFast -Dcpu=generic

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: lightpanda-build-release
          path: |
            zig-out/bin/lightpanda
          retention-days: 1

  wpt-build-runner:
    name: build wpt runner

    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          repository: 'lightpanda-io/demo'
          fetch-depth: 0

      - run: |
          cd ./wptrunner
          CGO_ENABLED=0 go build

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wptrunner
          path: |
            wptrunner/wptrunner
          retention-days: 1

  run-wpt:
    name: web platform tests json output
    needs:
      - wpt-build-release
      - wpt-build-runner

    # use a self host runner.
    runs-on: lpd-wpt-aws
    timeout-minutes: 600

    steps:
      - uses: actions/checkout@v6
        with:
          ref: fork
          repository: 'lightpanda-io/wpt'
          fetch-depth: 0

      # The hosts are configured manually on the self host runner.
      # - name: create custom hosts
      #   run: ./wpt make-hosts-file | sudo tee -a /etc/hosts

      - name: generate manifest
        run: ./wpt manifest

      - name: download lightpanda release
        uses: actions/download-artifact@v8
        with:
          name: lightpanda-build-release

      - run: chmod a+x ./lightpanda

      - name: download wptrunner
        uses: actions/download-artifact@v8
        with:
          name: wptrunner

      - run: chmod a+x ./wptrunner

      - name: run test with json output
        run: |
          ./wpt serve 2> /dev/null & echo $! > WPT.pid
          sleep 20s
          ./wptrunner -lpd-path ./lightpanda -json -concurrency 5 -pool 5 --mem-limit 400 > wpt.json
          kill `cat WPT.pid`

      - name: summarize results by area
        if: always()
        run: |
          test -s wpt.json || { echo "No wpt.json produced; nothing to summarize." >> "$GITHUB_STEP_SUMMARY"; exit 0; }
          python3 - wpt.json >> "$GITHUB_STEP_SUMMARY" <<'PY'
          import collections, json, sys
          try:
              with open(sys.argv[1]) as fh:
                  results = json.load(fh)
          except Exception as e:
              print(f"Could not parse {sys.argv[1]}: {e}")
              sys.exit(0)
          total = len(results)
          passed = sum(1 for t in results if t.get("pass"))
          # area = first path segment of the test name, e.g. /FileAPI/x.html -> FileAPI
          stats = collections.defaultdict(lambda: [0, 0, 0, 0])  # [tests, passed, subtests, sub_passed]
          for t in results:
              seg = (t.get("name") or "").lstrip("/").split("/", 1)
              s = stats[seg[0] if seg and seg[0] else "(root)"]
              s[0] += 1
              s[1] += 1 if t.get("pass") else 0
              for c in t.get("cases") or []:
                  s[2] += 1
                  s[3] += 1 if c.get("pass") else 0
          pct = lambda p, n: f"{(100.0 * p / n):.1f}%" if n else "-"
          rows = [(a, n, p, n - p, cp, ct) for a, (n, p, ct, cp) in stats.items()]
          rows.sort(key=lambda r: (-r[3], r[0]))  # most failing tests first
          row = lambda a, n, p, f, cp, ct: f"| `/{a}/` | {n:,} | {p:,} | {f:,} | {pct(p, n)} | {cp:,}/{ct:,} |"
          head = ["| Area | Tests | Passed | Failed | Pass rate | Subtests |",
                  "|------|------:|-------:|-------:|----------:|---------:|"]
          out = ["## WPT results by area", "",
                 f"**{passed:,} / {total:,} tests passing ({pct(passed, total)})**, "
                 f"{total - passed:,} failing across {len(rows)} areas.", "",
                 "Sorted by failing tests, so the areas with the most to gain sit on top:", ""]
          out += head + [row(*r) for r in rows[:25]]
          if len(rows) > 25:
              out += ["", f"<details><summary>{len(rows) - 25} more areas</summary>", ""] + head
              out += [row(*r) for r in rows[25:]] + ["", "</details>"]
          print("\n".join(out))
          PY

      - name: write commit
        run: |
          echo "${{github.sha}}" > commit.txt

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wpt-results
          path: |
            wpt.json
            commit.txt
          retention-days: 10

  perf-fmt:
    name: perf-fmt
    needs: run-wpt

    runs-on: ubuntu-latest
    timeout-minutes: 15

    container:
      image: ghcr.io/lightpanda-io/perf-fmt:latest
      credentials:
       username: ${{ github.actor }}
       password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: download artifact
        uses: actions/download-artifact@v8
        with:
          name: wpt-results

      - name: format and send json result
        run: /perf-fmt wpt ${{ github.sha }} wpt.json

  wptdiff:
    name: perf-fmt
    needs: perf-fmt

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          repository: 'lightpanda-io/demo'
          fetch-depth: 0

      - run: |
          cd ./wptdiff
          CGO_ENABLED=0 go build

      - run: |
         ./wptdiff/wptdiff --completion |tee completion.log

      - name: Send completion to slack
        uses: slackapi/slack-github-action@v3.0.1
        with:
          errors: true
          method: files.uploadV2
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel_id: ${{ vars.WPT_SLACK_CHANNEL_ID }}
            initial_comment: "Last WPT completion"
            file: "./completion.log"
            filename: "wpt-completion-${{ github.sha }}.txt"

      - run: |
         ./wptdiff/wptdiff |tee diff.log

      - name: Send regression to slack
        uses: slackapi/slack-github-action@v3.0.1
        with:
          errors: true
          method: files.uploadV2
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel_id: ${{ vars.WPT_SLACK_CHANNEL_ID }}
            initial_comment: "Last WPT regressions"
            file: "./diff.log"
            filename: "wpt-regression-${{ github.sha }}.txt"
