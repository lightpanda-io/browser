name: release build

env:
  AWS_ACCESS_KEY_ID: ${{ vars.NIGHTLY_BUILD_AWS_ACCESS_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.NIGHTLY_BUILD_AWS_SECRET_ACCESS_KEY }}
  AWS_BUCKET: ${{ vars.NIGHTLY_BUILD_AWS_BUCKET }}
  AWS_REGION: ${{ vars.NIGHTLY_BUILD_AWS_REGION }}

  RELEASE: ${{ github.ref_type == 'tag' && github.ref_name || 'nightly' }}
  VERSION_FLAG: ${{ github.ref_type == 'tag' && format('-Dversion={0}', github.ref_name) || '-Dversion=nightly' }}

on:
  push:
    tags:
      - '*'
  schedule:
    - cron: "2 2 * * *"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
            cpu_flag: -Dcpu=x86_64
          - arch: aarch64
            runner: ubuntu-22.04-arm
            cpu_flag: -Dcpu=generic

    env:
      ARCH: ${{ matrix.arch }}
      OS: linux

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/install
        with:
          os: ${{env.OS}}
          arch: ${{env.ARCH}}

      - name: v8 snapshot
        run: zig build -Dprebuilt_v8_path=v8/libc_v8.a -Doptimize=ReleaseFast snapshot_creator -- src/snapshot.bin

      - name: zig build
        run: zig build -Dsnapshot_path=../../snapshot.bin -Dprebuilt_v8_path=v8/libc_v8.a -Doptimize=ReleaseFast ${{ matrix.cpu_flag }} ${{ env.VERSION_FLAG }}

      - name: Rename binary
        run: mv zig-out/bin/lightpanda lightpanda-${{ env.ARCH }}-${{ env.OS }}

      - name: upload on s3
        run: |
          export DIR=`git show --no-patch --no-notes --pretty='%cs_%h'`
          aws s3 cp --storage-class=GLACIER_IR lightpanda-${{ env.ARCH }}-${{ env.OS }} s3://lpd-nightly-build/${DIR}/lightpanda-${{ env.ARCH }}-${{ env.OS }}

      - name: Upload the build
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: lightpanda-${{ env.ARCH }}-${{ env.OS }}
          tag: ${{ env.RELEASE }}
          makeLatest: true

      - name: Share binary with packaging jobs
        uses: actions/upload-artifact@v4
        with:
          name: lightpanda-${{ env.ARCH }}-${{ env.OS }}
          path: lightpanda-${{ env.ARCH }}-${{ env.OS }}
          retention-days: 1

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-14 runs on arm CPU. see
          # https://github.com/actions/runner-images?tab=readme-ov-file
          - arch: aarch64
            runner: macos-14
          - arch: x86_64
            runner: macos-14-large

    env:
      ARCH: ${{ matrix.arch }}
      OS: macos

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/install
        with:
          os: ${{env.OS}}
          arch: ${{env.ARCH}}

      - name: v8 snapshot
        run: zig build -Dprebuilt_v8_path=v8/libc_v8.a -Doptimize=ReleaseFast snapshot_creator -- src/snapshot.bin

      - name: zig build
        run: zig build -Dsnapshot_path=../../snapshot.bin -Dprebuilt_v8_path=v8/libc_v8.a -Doptimize=ReleaseFast ${{ env.VERSION_FLAG }}

      - name: Rename binary
        run: mv zig-out/bin/lightpanda lightpanda-${{ env.ARCH }}-${{ env.OS }}

      - name: upload on s3
        run: |
          export DIR=`git show --no-patch --no-notes --pretty='%cs_%h'`
          aws s3 cp --storage-class=GLACIER_IR lightpanda-${{ env.ARCH }}-${{ env.OS }} s3://lpd-nightly-build/${DIR}/lightpanda-${{ env.ARCH }}-${{ env.OS }}

      - name: Upload the build
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: lightpanda-${{ env.ARCH }}-${{ env.OS }}
          tag: ${{ env.RELEASE }}
          makeLatest: true

  package-archlinux:
    if: github.ref_type == 'tag'
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]

    env:
      ARCH: ${{ matrix.arch }}
      OS: linux

    needs: build-linux
    runs-on: ubuntu-22.04
    container: archlinux:latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Install packaging deps
        run: pacman -Syu --noconfirm --needed base-devel sudo

      - name: Download linux binary
        uses: actions/download-artifact@v4
        with:
          name: lightpanda-${{ env.ARCH }}-${{ env.OS }}
          path: .

      - name: Build Arch package
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

          RAW_VERSION="${{ env.RELEASE }}"
          PKGVER="${RAW_VERSION#v}"
          PKGREL="1"
          echo "PKGVER=${PKGVER}" >> "$GITHUB_ENV"
          echo "PKGREL=${PKGREL}" >> "$GITHUB_ENV"

          mkdir -p pkg
          cp lightpanda-${{ env.ARCH }}-${{ env.OS }} pkg/
          cp LICENSE pkg/

          cat > pkg/PKGBUILD <<EOF
          pkgname=lightpanda
          pkgver=${PKGVER}
          pkgrel=${PKGREL}
          pkgdesc="Lightpanda, headless browser built for AI and automation"
          arch=('x86_64' 'aarch64')
          url="https://lightpanda.io"
          license=('AGPL-3.0-or-later')
          options=(!strip !debug)
          package() {
              install -Dm755 "\$startdir/lightpanda-\$CARCH-linux" "\$pkgdir/usr/bin/lightpanda"
              install -Dm644 "\$startdir/LICENSE" "\$pkgdir/usr/share/licenses/\$pkgname/LICENSE"
          }
          EOF

          chown -R builder:builder pkg
          cd pkg
          sudo -u builder env CARCH=${{ env.ARCH }} makepkg -f --noconfirm -A

      - name: Upload Arch package to release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: pkg/lightpanda-${{ env.PKGVER }}-${{ env.PKGREL }}-${{ env.ARCH }}.pkg.tar.zst
          tag: ${{ env.RELEASE }}
          makeLatest: true

  package-debian:
    if: github.ref_type == 'tag'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            deb_arch: amd64
          - arch: aarch64
            deb_arch: arm64

    env:
      ARCH: ${{ matrix.arch }}
      DEB_ARCH: ${{ matrix.deb_arch }}
      OS: linux

    needs: build-linux
    runs-on: ubuntu-22.04
    container: debian:stable-slim
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Install packaging deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends dpkg-dev

      - name: Download linux binary
        uses: actions/download-artifact@v4
        with:
          name: lightpanda-${{ env.ARCH }}-${{ env.OS }}
          path: .

      - name: Build Debian package
        run: |
          RAW_VERSION="${{ env.RELEASE }}"
          PKGVER="${RAW_VERSION#v}"
          echo "PKGVER=${PKGVER}" >> "$GITHUB_ENV"

          ROOT="lightpanda_${PKGVER}_${DEB_ARCH}"
          mkdir -p "$ROOT/DEBIAN" "$ROOT/usr/bin" "$ROOT/usr/share/doc/lightpanda"

          install -m755 "lightpanda-${ARCH}-${OS}" "$ROOT/usr/bin/lightpanda"
          install -m644 LICENSE "$ROOT/usr/share/doc/lightpanda/copyright"

          cat > "$ROOT/DEBIAN/control" <<EOF
          Package: lightpanda
          Version: ${PKGVER}
          Section: web
          Priority: optional
          Architecture: ${DEB_ARCH}
          Depends: libc6 (>= 2.35)
          Maintainer: Lightpanda <hello@lightpanda.io>
          Homepage: https://lightpanda.io
          Description: Lightpanda, headless browser built for AI and automation
          EOF

          dpkg-deb --build --root-owner-group "$ROOT"

      - name: Upload Debian package to release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: lightpanda_${{ env.PKGVER }}_${{ env.DEB_ARCH }}.deb
          tag: ${{ env.RELEASE }}
          makeLatest: true
